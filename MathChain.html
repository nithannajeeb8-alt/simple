<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nithan // SYS.MULTIPLIER</title>
    
    <link rel="icon" type="image/png" href="/favicon.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@100;300;400;500&display=swap" rel="stylesheet">
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* CORE SYSTEM VARIABLES */
        :root {
            --bg: #0a0a0b; 
            --text-main: #f4f4f5; 
            --text-muted: rgba(244, 244, 245, 0.45);
            --accent-gold: #e6cc98; 
            --accent-cyan: #88c0d0; /* Used for auto-generated chain reactions */
            --serif: 'Playfair Display', serif;
            --mono: 'JetBrains Mono', monospace;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); color: var(--text-main); font-family: var(--mono); 
            font-weight: 300; overflow-x: hidden; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            padding: 100px 20px 40px 20px; user-select: none;
        }

        /* AMBIENT BACKGROUND */
        .ambient-orb { position: fixed; border-radius: 50%; z-index: -1; pointer-events: none; opacity: 0.4; filter: blur(60px); }
        .orb-1 { width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(230, 204, 152, 0.1) 0%, transparent 70%); top: 10%; left: -10%; }
        .orb-2 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(136, 192, 208, 0.05) 0%, transparent 70%); bottom: -10%; right: -10%; }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.035; mix-blend-mode: overlay; }

        /* NAVIGATION */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 6vw; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; background: linear-gradient(to bottom, rgba(10,10,11,0.9) 0%, transparent 100%);
        }
        .brand-text { font-family: var(--serif); font-size: 1.4rem; color: var(--text-main); text-decoration: none; letter-spacing: 1.5px; }
        .back-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        .back-btn:hover { color: var(--accent-gold); }

        /* MAIN INTERFACE */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border);
            box-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.15), 0 20px 40px rgba(0, 0, 0, 0.4);
            border-radius: 24px; padding: 3rem; width: 100%; max-width: 500px; position: relative;
        }

        .sys-stamp { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 2rem; display: flex; justify-content: space-between; text-transform: uppercase; }
        .lvl-counter { color: var(--accent-gold); }

        /* TARGET HEADER */
        .target-container { text-align: center; margin-bottom: 3rem; }
        .target-label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 0.5rem; }
        .target-number { font-family: var(--serif); font-size: 5rem; color: var(--text-main); line-height: 1; text-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        .target-number.win { color: var(--accent-gold); text-shadow: 0 0 40px rgba(230, 204, 152, 0.4); }

        /* 3x3 GRID */
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 3rem;
        }
        
        .cell {
            aspect-ratio: 1/1; border-radius: 16px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: center; align-items: center;
            font-family: var(--serif); font-size: 2.2rem; color: var(--text-main); cursor: pointer;
            transition: all 0.2s ease; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .cell:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.15); }
        .cell.player-input { color: var(--text-main); background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        .cell.auto-gen { color: var(--accent-cyan); background: rgba(136, 192, 208, 0.1); border-color: rgba(136, 192, 208, 0.3); pointer-events: none; }
        .cell.target-match { color: var(--accent-gold); background: rgba(230, 204, 152, 0.15); border-color: var(--accent-gold); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(230, 204, 152, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(230, 204, 152, 0); } 100% { box-shadow: 0 0 0 0 rgba(230, 204, 152, 0); } }

        /* CONTROLS (KEYPAD) */
        .controls-container { border-top: 1px solid var(--glass-border); padding-top: 2rem; }
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1rem; }
        
        .key {
            padding: 12px 0; border-radius: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border); color: var(--text-muted); font-family: var(--mono); font-size: 1.2rem;
            cursor: pointer; transition: all 0.2s ease;
        }
        .key:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-main); }
        .key.active { background: var(--text-main); color: var(--bg); font-weight: 600; box-shadow: 0 4px 15px rgba(255,255,255,0.2); transform: translateY(-2px); }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn {
            padding: 14px 0; border-radius: 12px; background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-main); font-family: var(--mono); font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; transition: all 0.2s ease;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.05); }
        .action-btn.erase.active { background: #bf616a; color: #fff; border-color: #bf616a; }

        /* OVERLAYS */
        .win-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 11, 0.9); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 10;
        }
        .win-overlay.active { opacity: 1; pointer-events: all; }
        .win-title { font-family: var(--serif); font-size: 3rem; color: var(--accent-gold); margin-bottom: 2rem; }

        @media (max-width: 768px) {
            body { padding-top: 80px; }
            .glass-card { padding: 2rem 1.5rem; }
            .target-number { font-size: 4rem; }
            .cell { font-size: 1.8rem; border-radius: 12px; }
            .key { padding: 10px 0; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <svg class="noise-overlay" aria-hidden="true" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <nav class="nav">
        <a href="index.html" class="brand-text">NITHAN.</a>
        <a href="game.html" class="back-btn">[ EXIT SYSTEM ]</a>
    </nav>

    <div class="glass-card">
        
        <div class="sys-stamp">
            <span>SYS.MULTIPLIER</span>
            <span class="lvl-counter" id="level-display">LVL_01</span>
        </div>

        <div class="target-container">
            <div class="target-label">TARGET_NODE</div>
            <div class="target-number" id="target-display">0</div>
        </div>

        <div class="grid-container" id="grid">
            </div>

        <div class="controls-container">
            <div class="keypad" id="keypad">
                </div>
            
            <div class="action-row">
                <button class="action-btn erase" id="btn-erase">[ ERASE ]</button>
                <button class="action-btn" id="btn-reset">[ REBOOT_GRID ]</button>
            </div>
        </div>

        <div class="win-overlay" id="win-screen">
            <h2 class="win-title">Node <i>Resolved</i>.</h2>
            <button class="action-btn" style="width: 200px; border-color: var(--accent-gold); color: var(--accent-gold);" id="btn-next">[ INITIATE_NEXT ]</button>
        </div>

    </div>

    <script>
        // --- HAPTIC FEEDBACK ---
        const vibrate = (pattern) => { if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch(e){} } };

        // --- GAME STATE ---
        const state = {
            target: 0,
            level: 1,
            difficultyCap: 3, // Starts easy (numbers 1-3)
            selectedNumber: null,
            isEraseMode: false,
            playerCells: new Array(9).fill(null), // Only tracks numbers the player clicked
            boardLocked: false
        };

        const WIN_DELAY = 1200;

        // --- DOM ELEMENTS ---
        const gridEl = document.getElementById('grid');
        const keypadEl = document.getElementById('keypad');
        const targetEl = document.getElementById('target-display');
        const levelEl = document.getElementById('level-display');
        const eraseBtn = document.getElementById('btn-erase');
        const resetBtn = document.getElementById('btn-reset');
        const winScreen = document.getElementById('win-screen');
        const nextBtn = document.getElementById('btn-next');

        // --- INITIALIZATION ---
        function initGame() {
            createGrid();
            createKeypad();
            generateLevel();
            setupEventListeners();
        }

        function createGrid() {
            gridEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.idx = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gridEl.appendChild(cell);
            }
        }

        function createKeypad() {
            keypadEl.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const key = document.createElement('div');
                key.className = 'key';
                key.innerText = i;
                key.dataset.val = i;
                key.addEventListener('click', () => selectNumber(i));
                keypadEl.appendChild(key);
            }
        }

        // --- LEVEL GENERATOR ---
        // Generates a mathematically guaranteed solvable puzzle
        function generateLevel() {
            state.boardLocked = false;
            state.playerCells.fill(null);
            winScreen.classList.remove('active');
            targetEl.classList.remove('win');
            
            levelEl.innerText = `LVL_${state.level.toString().padStart(2, '0')}`;
            if (state.level > 3) state.difficultyCap = 5;
            if (state.level > 7) state.difficultyCap = 9;

            // To guarantee a solvable chain reaction, we simulate placing numbers 
            // in specific "seed" spots (Top-Left, Top-Mid, Mid-Left, Mid-Mid)
            let simGrid = new Array(9).fill(null);
            const seedIndices = [0, 1, 3, 4]; 
            
            seedIndices.forEach(idx => {
                simGrid[idx] = Math.floor(Math.random() * state.difficultyCap) + 1;
            });

            // Calculate the theoretical outcome
            let simResult = calculateLogic(simGrid);
            
            // Set target to the bottom-right corner (Index 8), which is the final chain product
            state.target = simResult.grid[8] || (simResult.grid[0] * 2); // Fallback if math fails somehow
            
            targetEl.innerText = state.target;
            renderBoard(new Array(9).fill(null), []); // Clear physical board
        }

        // --- CORE MATH ENGINE ---
        function calculateLogic(baseArray) {
            let grid = [...baseArray];
            let autoGenerated = [];
            let changed = true;

            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8]  // Cols
            ];

            // Loop until no new chain reactions happen
            while (changed) {
                changed = false;
                for (let line of lines) {
                    let [a, b, c] = line;
                    let vals = [grid[a], grid[b], grid[c]];
                    let filledCount = vals.filter(v => v !== null).length;

                    if (filledCount === 2) {
                        let emptyIdx = line[vals.indexOf(null)];
                        let filledVals = vals.filter(v => v !== null);
                        let product = filledVals[0] * filledVals[1];

                        grid[emptyIdx] = product;
                        autoGenerated.push({ idx: emptyIdx, val: product });
                        changed = true;
                    }
                }
            }
            return { grid, autoGenerated };
        }

        // --- INTERACTIONS ---
        function selectNumber(val) {
            if (state.boardLocked) return;
            state.selectedNumber = val;
            state.isEraseMode = false;
            
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            document.querySelector(`.key[data-val="${val}"]`).classList.add('active');
            eraseBtn.classList.remove('active');
            vibrate(15);
        }

        function toggleErase() {
            if (state.boardLocked) return;
            state.isEraseMode = true;
            state.selectedNumber = null;
            
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            eraseBtn.classList.add('active');
            vibrate(20);
        }

        function handleCellClick(idx) {
            if (state.boardLocked) return;

            // ERASE LOGIC
            if (state.isEraseMode) {
                if (state.playerCells[idx] !== null) {
                    state.playerCells[idx] = null;
                    vibrate([20, 30]);
                    processBoard();
                }
                return;
            }

            // PLACE LOGIC
            if (state.selectedNumber !== null && state.playerCells[idx] === null) {
                // Prevent placing over auto-generated cells
                const currentVisualState = calculateLogic(state.playerCells);
                if (currentVisualState.grid[idx] !== null && currentVisualState.grid[idx] !== state.playerCells[idx]) {
                    vibrate([50, 50]); // Error vibration
                    return; 
                }

                state.playerCells[idx] = state.selectedNumber;
                vibrate(20);
                
                // Animate physical tap
                gsap.from(gridEl.children[idx], { scale: 0.8, duration: 0.3, ease: 'back.out(2)' });
                processBoard();
            }
        }

        // --- PROCESSING & RENDERING ---
        function processBoard() {
            const result = calculateLogic(state.playerCells);
            renderBoard(result.grid, result.autoGenerated);
            checkWin(result.grid);
        }

        function renderBoard(fullGrid, autoData) {
            const cells = gridEl.children;
            
            for (let i = 0; i < 9; i++) {
                let cell = cells[i];
                let val = fullGrid[i];
                
                // Reset Classes
                cell.className = 'cell';
                cell.innerText = val !== null ? val : '';

                if (val !== null) {
                    if (state.playerCells[i] !== null) {
                        cell.classList.add('player-input');
                    } else {
                        cell.classList.add('auto-gen');
                        // Animate new auto-generated cells
                        if (!cell.dataset.renderedVal || cell.dataset.renderedVal != val) {
                            gsap.from(cell, { scale: 0, rotationX: 90, duration: 0.5, ease: 'back.out(1.5)' });
                            vibrate(40);
                        }
                    }
                }
                cell.dataset.renderedVal = val;
            }
        }

        function checkWin(fullGrid) {
            // Find if the target exists anywhere in the grid
            const targetIdx = fullGrid.findIndex(val => val === state.target);
            
            if (targetIdx !== -1) {
                state.boardLocked = true;
                vibrate([100, 50, 100, 50, 200]); // Win pattern
                
                const winCell = gridEl.children[targetIdx];
                winCell.classList.add('target-match');
                targetEl.classList.add('win');

                setTimeout(() => {
                    winScreen.classList.add('active');
                }, WIN_DELAY);
            }
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            eraseBtn.addEventListener('click', toggleErase);
            resetBtn.addEventListener('click', () => {
                if (state.boardLocked) return;
                state.playerCells.fill(null);
                vibrate([30, 30]);
                processBoard();
            });
            nextBtn.addEventListener('click', () => {
                state.level++;
                generateLevel();
            });
        }

        // Start Game
        initGame();

    </script>
</body>
</html>
