<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nithan // SYS.FLAMES</title>
    
    <link rel="icon" type="image/png" href="/favicon.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@100;300;400;500&display=swap" rel="stylesheet">
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* CORE VARIABLES & BASE SYSTEM */
        :root {
            --bg: #0a0a0b; 
            --text-main: #f4f4f5; 
            --text-muted: rgba(244, 244, 245, 0.45);
            --accent-gold: #e6cc98; 
            --serif: 'Playfair Display', serif;
            --mono: 'JetBrains Mono', monospace;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--mono); font-weight: 300; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* AMBIENT BACKGROUND */
        .ambient-orb { position: fixed; border-radius: 50%; z-index: -1; pointer-events: none; opacity: 0.5; filter: blur(60px); }
        .orb-1 { width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(230, 204, 152, 0.1) 0%, transparent 70%); top: 10%; left: -10%; }
        .orb-2 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%); bottom: -10%; right: -10%; }
        
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.035; mix-blend-mode: overlay; }

        /* NAVIGATION */
        .nav { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 6vw; display: flex; justify-content: space-between; z-index: 100; }
        .brand-text { font-family: var(--serif); font-size: 1.2rem; color: var(--text-main); text-decoration: none; letter-spacing: 1.5px; }
        .back-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        .back-btn:hover { color: var(--accent-gold); }

        /* GLASS CARD */
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border);
            box-shadow: inset 0px 1px 1px rgba(255, 255, 255, 0.15), 0 20px 40px rgba(0, 0, 0, 0.4);
            border-radius: 24px; padding: 4rem 3rem; width: 90vw; max-width: 600px; position: relative; overflow: hidden;
        }

        .sys-stamp { font-size: 0.65rem; color: var(--accent-gold); letter-spacing: 2px; margin-bottom: 2rem; display: block; text-transform: uppercase; }
        .title { font-family: var(--serif); font-size: 3.5rem; font-weight: 300; margin-bottom: 1rem; line-height: 1; }
        .title i { color: var(--text-muted); }
        .desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 3rem; }

        /* INPUTS */
        .input-group { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 3rem; }
        .input-field {
            background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main); font-family: var(--mono); font-size: 1.2rem; padding: 12px 0; outline: none; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .input-field:focus { border-bottom-color: var(--accent-gold); }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.1); }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-main);
            padding: 16px 32px; border-radius: 100px; font-family: var(--mono); font-size: 0.85rem; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.4s ease; text-transform: uppercase; width: 100%;
        }
        .glass-btn:hover { background: var(--text-main); color: var(--bg); transform: translateY(-2px); }

        /* VIEW CONTAINERS */
        #view-input, #view-process, #view-result { display: none; }
        #view-input.active, #view-process.active, #view-result.active { display: block; animation: fadeIn 0.8s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* PROCESSING VIEW (CROSSING OUT) */
        .process-names { font-family: var(--mono); font-size: 1.5rem; letter-spacing: 4px; text-align: center; margin: 3rem 0; display: flex; flex-direction: column; gap: 2rem; }
        .name-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; }
        .letter { position: relative; display: inline-block; color: var(--text-main); transition: color 0.3s ease; }
        .letter.crossed { color: var(--text-muted); }
        .letter.crossed::after {
            content: ''; position: absolute; top: 50%; left: -10%; width: 120%; height: 2px;
            background-color: var(--accent-gold); transform: translateY(-50%) scaleX(0); transform-origin: left;
        }
        .letter.crossed-animate::after { animation: crossOut 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        @keyframes crossOut { to { transform: translateY(-50%) scaleX(1); } }

        .flames-array { font-family: var(--serif); font-size: 2rem; display: flex; justify-content: center; gap: 1rem; color: var(--text-muted); margin-top: 2rem; }
        .f-letter { transition: all 0.4s ease; }
        .f-letter.active { color: var(--accent-gold); transform: scale(1.2); }
        .f-letter.eliminated { opacity: 0.1; transform: scale(0.8); }

        /* RESULT VIEW */
        .result-header { text-align: center; margin-bottom: 3rem; }
        .result-letter { font-family: var(--serif); font-size: 6rem; color: var(--accent-gold); line-height: 1; margin-bottom: 1rem; text-shadow: 0 0 30px rgba(230, 204, 152, 0.3); }
        .result-word { font-size: 1.5rem; letter-spacing: 6px; text-transform: uppercase; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 2rem 0; margin-bottom: 2rem; }
        .metric-box { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .metric-label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 1px; }
        .metric-value { font-size: 2rem; font-family: var(--serif); color: var(--text-main); }
        
        .result-desc { font-size: 0.95rem; line-height: 1.8; color: var(--text-muted); text-align: center; font-style: italic; }
        .reset-btn { margin-top: 3rem; background: transparent; }
        .reset-btn:hover { background: rgba(255,255,255,0.05); color: var(--accent-gold); border-color: var(--accent-gold); }

        @media (max-width: 768px) {
            .glass-card { padding: 3rem 2rem; border-radius: 20px; }
            .title { font-size: 2.5rem; }
            .process-names { font-size: 1.2rem; }
            .result-letter { font-size: 4.5rem; }
            .metrics-grid { gap: 1rem; }
        }
    </style>
</head>
<body>

    <svg class="noise-overlay" aria-hidden="true" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <nav class="nav">
        <a href="index.html" class="brand-text">NITHAN.</a>
        <a href="index.html" class="back-btn">[ TERMINATE ]</a>
    </nav>

    <div class="glass-card">
        
        <div id="view-input" class="active">
            <span class="sys-stamp">SYS.MODULE // FLAMES</span>
            <h1 class="title">Biometric <i>Analysis</i>.</h1>
            <p class="desc">Enter two identification strings to calculate biological and structural resonance.</p>
            
            <div class="input-group">
                <input type="text" id="name1" class="input-field" placeholder="SUBJECT_01" autocomplete="off" spellcheck="false">
                <input type="text" id="name2" class="input-field" placeholder="SUBJECT_02" autocomplete="off" spellcheck="false">
            </div>
            
            <button class="glass-btn" onclick="initiateAnalysis()">Execute Scan</button>
        </div>

        <div id="view-process">
            <span class="sys-stamp">PROCESSING // DATA_MERGE</span>
            
            <div class="process-names">
                <div class="name-row" id="proc-name1"></div>
                <div class="name-row" id="proc-name2"></div>
            </div>

            <div class="flames-array" id="proc-flames">
                <span class="f-letter" id="flame-F">F</span>
                <span class="f-letter" id="flame-L">L</span>
                <span class="f-letter" id="flame-A">A</span>
                <span class="f-letter" id="flame-M">M</span>
                <span class="f-letter" id="flame-E">E</span>
                <span class="f-letter" id="flame-S">S</span>
            </div>
        </div>

        <div id="view-result">
            <span class="sys-stamp">ANALYSIS // COMPLETE</span>
            
            <div class="result-header">
                <div class="result-letter" id="res-letter">X</div>
                <div class="result-word" id="res-word">UNKNOWN</div>
            </div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="metric-label">AFFECTION_QUOTIENT</span>
                    <span class="metric-value" id="res-percent">0%</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">MATCHING_NODES</span>
                    <span class="metric-value" id="res-nodes">0</span>
                </div>
            </div>

            <p class="result-desc" id="res-desc">System description will output here.</p>
            
            <button class="glass-btn reset-btn" onclick="resetSystem()">[ RECALCULATE ]</button>
        </div>

    </div>

    <script>
        // Haptic Feedback Helper
        const triggerVibration = (pattern) => {
            if (navigator.vibrate) {
                try { navigator.vibrate(pattern); } catch(e) {}
            }
        };

        // System Descriptions (10 highly thematic logs per outcome)
        const descriptions = {
            'F': [
                "A stable neural link established. Safe, reliable, but lacking high-voltage voltage variance.",
                "Parallel trajectories confirmed. You will run alongside each other without critical intersection.",
                "Baseline protocol: Friendship. Structural integrity is sound.",
                "Co-op mode engaged. Systems sync well for shared objective execution.",
                "Non-volatile connection. A solid foundation for data sharing and mutual processing.",
                "The algorithm predicts a comfortable, low-friction operating state.",
                "Companion nodes detected. High potential for long-term alliance.",
                "No romantic override found. Defaulting to standard companion protocol.",
                "System architecture suggests an unbreakable, platonic data tether.",
                "Harmonious frequency. You are programmed to protect each other."
            ],
            'L': [
                "High-resonance emotional tethering achieved. Systems are completely synced.",
                "Biological and structural synchronization is operating at peak efficiency.",
                "A dangerous but beautiful code merge. You are written for each other.",
                "Critical affection overload. The servers cannot contain this frequency.",
                "Lover protocol engaged. Expect high voltage and deep systemic integration.",
                "Perfect algorithmic harmony. A flawless, romantic compilation.",
                "Your strings of fate are permanently entangled in the mainframe.",
                "An incredibly rare 1-to-1 hash match. The system designates you as soul-bound.",
                "Warning: Emotional parameters exceeding standard limits. Love detected.",
                "Absolute structural unity. You complete the other's missing variables."
            ],
            'A': [
                "Elevated baseline resonance. A magnetic pull is detected in background processes.",
                "Affection subroutines are actively compiling. Strong potential for deeper integration.",
                "Warm data signatures. You orbit each other with increasing gravitational pull.",
                "A gentle, persistent system ping. The connection is soft but undeniable.",
                "Mutual attraction recognized. The nodes are slowly gravitating toward a merge.",
                "Not fully synchronized, but the underlying code expresses deep fondness.",
                "A quiet but powerful frequency alignment. The system approves.",
                "Affection matrix active. Care and attention protocols are running flawlessly.",
                "You are registered as a highly favored entity in their database.",
                "Soft integration detected. A beautiful, budding connection."
            ],
            'M': [
                "Permanent system merge authorized. Infinite loop established.",
                "Marriage protocol locked. You are structurally bound for the lifetime of the hardware.",
                "The algorithm predicts a permanent, unbreakable systemic contract.",
                "Ultimate execution. Your timelines have converged into a single operation.",
                "Two independent frameworks unified into one flawless architecture.",
                "A lifelong data tether. The servers predict an enduring partnership.",
                "System lock engaged. You are bound by the most absolute digital vow.",
                "The highest tier of operational union. A perfect, permanent compilation.",
                "Fate parameters verified. A lifetime of shared processing ahead.",
                "Complete architectural fusion. You belong to the same mainframe now."
            ],
            'E': [
                "Fatal system conflict. Base architectures are entirely incompatible.",
                "Enemy protocol flagged. Approaching this node will result in data corruption.",
                "High-friction frequency detected. Your systems naturally repel one another.",
                "Warning: Hostile structural variance. Do not attempt a system merge.",
                "Complete algorithmic rejection. Your variables clash on every level.",
                "The firewall denies this connection. Mutual destruction is highly probable.",
                "Inverted frequencies. You are designed to operate as opposing forces.",
                "System error: Severe personality conflict detected in the code.",
                "Antagonist elements found. It is highly advised to terminate the link.",
                "A chaotic compilation. The servers predict nothing but sparks and crashes."
            ],
            'S': [
                "Shared origin nodes. You operate less like lovers and more like structural kin.",
                "Familiar framework detected. A protective, sibling-like protocol is active.",
                "You share a profound, familial frequency. Romantic overrides disabled.",
                "The code binds you through loyalty, mirroring a brother/sister sub-routine.",
                "A bond built on annoyance, protection, and unbreakable shared history.",
                "System categorizes this as a platonic, deeply rooted familial link.",
                "You are programmed to agitate each other, yet defend each other globally.",
                "No romantic variables found. Just pure, chaotic sibling energy.",
                "Your data trees branch from the same theoretical root.",
                "A connection that is entirely unromantic, but fundamentally unbreakable."
            ]
        };

        const flamesMap = { 'F': 'Friends', 'L': 'Lovers', 'A': 'Affection', 'M': 'Marriage', 'E': 'Enemies', 'S': 'Siblings' };
        const flamesArray = ['F', 'L', 'A', 'M', 'E', 'S'];

        function switchView(viewId) {
            document.querySelectorAll('.glass-card > div').forEach(div => div.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function resetSystem() {
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
            switchView('view-input');
        }

        function initiateAnalysis() {
            let n1 = document.getElementById('name1').value.trim().toLowerCase();
            let n2 = document.getElementById('name2').value.trim().toLowerCase();

            if (!n1 || !n2) {
                triggerVibration([50, 50, 50]);
                alert("SYSTEM ERROR: Please input two valid identification strings.");
                return;
            }

            // Transition to Processing
            switchView('view-process');
            
            // Clean strings for math
            let arr1 = n1.replace(/[^a-z]/g, '').split('');
            let arr2 = n2.replace(/[^a-z]/g, '').split('');
            let totalLetters = arr1.length + arr2.length;
            
            // Setup Visuals
            const row1 = document.getElementById('proc-name1');
            const row2 = document.getElementById('proc-name2');
            row1.innerHTML = ''; row2.innerHTML = '';
            
            arr1.forEach((char, i) => row1.innerHTML += `<span class="letter" id="n1-${i}">${char.toUpperCase()}</span>`);
            arr2.forEach((char, i) => row2.innerHTML += `<span class="letter" id="n2-${i}">${char.toUpperCase()}</span>`);

            // Reset FLAMES UI
            flamesArray.forEach(f => {
                let el = document.getElementById(`flame-${f}`);
                el.className = 'f-letter';
            });

            // Mathematical Logic: Find matches
            let commonCount = 0;
            let toCross1 = [];
            let toCross2 = [];

            for (let i = 0; i < arr1.length; i++) {
                if (arr1[i] !== '*') {
                    let matchIdx = arr2.indexOf(arr1[i]);
                    if (matchIdx !== -1) {
                        toCross1.push(`n1-${i}`);
                        toCross2.push(`n2-${matchIdx}`);
                        arr1[i] = '*';
                        arr2[matchIdx] = '*';
                        commonCount++;
                    }
                }
            }

            let remainingCount = arr1.filter(c => c !== '*').length + arr2.filter(c => c !== '*').length;
            if (remainingCount === 0) remainingCount = 1; // Fallback to avoid infinite loops

            // Calculate Affection Quotient (Deterministic formula based on matched vs total)
            let affectionQuotient = Math.round(((commonCount * 2) / totalLetters) * 100);
            if (affectionQuotient === 0) affectionQuotient = Math.floor(Math.random() * 15) + 5; // Base pity score

            // ANIMATION TIMELINE
            const tl = gsap.timeline();

            // 1. Cross out matching letters
            toCross1.forEach((id, index) => {
                tl.add(() => {
                    document.getElementById(id).classList.add('crossed', 'crossed-animate');
                    document.getElementById(toCross2[index]).classList.add('crossed', 'crossed-animate');
                    triggerVibration(20); // Small haptic tick
                }, `+=${0.3}`);
            });

            // 2. FLAMES Elimination Logic
            let activeFlames = [...flamesArray];
            let currentIdx = 0;

            tl.add(() => { triggerVibration(100); }, "+=0.5"); // Pause before elimination

            while (activeFlames.length > 1) {
                currentIdx = (currentIdx + remainingCount - 1) % activeFlames.length;
                let eliminatedLetter = activeFlames.splice(currentIdx, 1)[0];
                
                tl.add(() => {
                    let el = document.getElementById(`flame-${eliminatedLetter}`);
                    el.classList.add('eliminated');
                    triggerVibration(40); // Haptic strike
                }, `+=${0.4}`);
            }

            let finalResult = activeFlames[0];

            // 3. Highlight final and transition
            tl.add(() => {
                document.getElementById(`flame-${finalResult}`).classList.add('active');
                triggerVibration([100, 50, 100, 50, 200]); // Success pattern
            }, "+=0.5");

            tl.add(() => {
                showResult(finalResult, affectionQuotient, commonCount * 2);
            }, "+=1.5");
        }

        function showResult(resultCode, percentage, nodes) {
            document.getElementById('res-letter').innerText = resultCode;
            document.getElementById('res-word').innerText = flamesMap[resultCode];
            
            // GSAP Counter for Percentage
            let percentObj = { val: 0 };
            gsap.to(percentObj, {
                val: percentage,
                duration: 1.5,
                ease: "power2.out",
                onUpdate: () => {
                    document.getElementById('res-percent').innerText = Math.round(percentObj.val) + "%";
                }
            });

            document.getElementById('res-nodes').innerText = nodes;

            // Random Description
            let descArray = descriptions[resultCode];
            let randomDesc = descArray[Math.floor(Math.random() * descArray.length)];
            document.getElementById('res-desc').innerText = `"${randomDesc}"`;

            switchView('view-result');
        }
    </script>
</body>
</html>
