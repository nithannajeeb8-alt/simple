<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #030001;
    --crimson: #ff003c;
    --crimson-dim: rgba(255, 0, 60, 0.15);
    --cyan: #00e5ff;
    --alert: #ffaa00;
    --font: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; }

  body {
    background-color: var(--bg-base);
    color: var(--crimson);
    font-family: var(--font);
    display: flex;
    flex-direction: column; /* Changed to column to stack the header and game */
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* CRT Screen Curvature Effect */
  body::after {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
    pointer-events: none;
    z-index: 50;
  }

  /* Moving CRT Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 51%);
    background-size: 100% 4px;
    animation: scan 10s linear infinite;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes scan {
    0% { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  /* SEO Visible Text Block formatted to fit the aesthetic */
  .seo-header {
    z-index: 20;
    text-align: center;
    max-width: 500px;
    width: 90%;
    margin-bottom: 20px;
  }

  .seo-header h1 {
    color: var(--cyan);
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0 0 8px 0;
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }

  .seo-header p {
    color: rgba(255, 255, 255, 0.6);
    font-size: 0.85rem;
    line-height: 1.5;
    margin: 0;
    letter-spacing: 0.5px;
  }

  /* Cyberpunk Hard-Surface Framing */
  .hud-container {
    z-index: 20;
    width: 90%;
    max-width: 500px;
    position: relative;
    padding: 2px;
    background: linear-gradient(45deg, var(--crimson), transparent 20%, transparent 80%, var(--crimson));
    clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  }

  .hud-inner {
    background: rgba(10, 0, 2, 0.95);
    padding: 30px;
    clip-path: polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
    position: relative;
  }

  .sys-header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--crimson-dim);
    padding-bottom: 10px;
    text-transform: uppercase;
  }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background-color: var(--crimson);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--crimson);
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .display-module {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 0, 60, 0.03);
    border: 1px solid var(--crimson-dim);
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }

  .main-time {
    font-size: 3.5rem;
    color: #fff;
    text-shadow: 0 0 15px var(--crimson), 0 0 30px var(--crimson);
  }

  /* Visual Noise for the Blind Phase */
  .noise-stream {
    font-size: 14px;
    color: var(--crimson);
    opacity: 0.5;
    word-break: break-all;
    line-height: 1;
    text-align: justify;
    padding: 5px;
    position: absolute;
    inset: 0;
    display: none;
  }

  /* Interactive Button */
  .action-btn {
    width: 100%;
    background: transparent;
    color: var(--crimson);
    border: 1px solid var(--crimson);
    padding: 18px;
    font-size: 1.8rem;
    font-family: var(--font);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:hover {
    background: rgba(255, 0, 60, 0.1);
  }

  .action-btn:active {
    background: var(--crimson);
    color: var(--bg-base);
  }

  .action-btn.active-state {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.2) inset;
    animation: btnGlitch 0.2s infinite;
  }

  .action-btn.active-state:active {
    background: var(--cyan);
    color: var(--bg-base);
  }

  @keyframes btnGlitch {
    0% { transform: translate(0) }
    20% { transform: translate(-2px, 1px) }
    40% { transform: translate(-1px, -1px) }
    60% { transform: translate(2px, 1px) }
    80% { transform: translate(1px, -1px) }
    100% { transform: translate(0) }
  }

  /* Stats Grid */
  .diagnostics {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 2rem;
    font-size: 13px;
    letter-spacing: 1px;
  }

  @media (min-width: 600px) {
    .diagnostics { grid-template-columns: 1fr 1fr; }
  }

  .data-block {
    border-top: 1px solid var(--crimson-dim);
    padding-top: 10px;
  }

  .data-label { color: rgba(255,255,255,0.5); font-size: 11px; margin-bottom: 5px; }
  .data-value { font-size: 1.2rem; }
  .cyan-text { color: var(--cyan); text-shadow: 0 0 8px rgba(0,229,255,0.6); }

  .memory-list {
    list-style: none; padding: 0; margin: 0;
  }
  .memory-list li {
    display: flex; justify-content: space-between;
    border-bottom: 1px dotted var(--crimson-dim);
    padding: 6px 0;
    opacity: 0.8;
  }
  .memory-list li:first-child { color: var(--alert); opacity: 1; }

</style>
</head>
<body>

<div class="scanlines"></div>

<div class="seo-header">
  <h1>10 Second Reaction Time Test</h1>
  <p>Engage the sequence and halt precisely at 10.000 seconds. Test your internal clock against F1 driver reaction benchmarks.</p>
</div>

<div class="hud-container">
  <div class="hud-inner">
    
    <div class="sys-header">
      <span>Stop exactly at 10.000s</span>
      <span><span class="status-dot" id="status-dot"></span> <span id="sys-status">Ready</span></span>
    </div>

    <div class="display-module">
      <div class="main-time" id="main-display">00.000s</div>
      <div class="noise-stream" id="noise-stream"></div>
    </div>

    <button class="action-btn" id="trigger-btn">START</button>

    <div class="diagnostics">
      <div class="data-block">
        <div class="data-label">Error Margin (Off by ms)</div>
        <div class="data-value" id="val-deviation">± --- ms</div>
        <div class="data-label" style="margin-top:15px;">F1 Driver Match</div>
        <div class="data-value cyan-text" id="val-profile">Play to find out</div>
      </div>
      
      <div class="data-block">
        <div class="data-label">Recent History</div>
        <ul class="memory-list" id="memory-cache">
          </ul>
      </div>
    </div>

  </div>
</div>

<script>
  let startTime = 0;
  let isRunning = false;
  let noiseInterval;
  const targetTime = 10.000;
  
  const displayEl = document.getElementById('main-display');
  const noiseEl = document.getElementById('noise-stream');
  const btnEl = document.getElementById('trigger-btn');
  const statusEl = document.getElementById('sys-status');
  const dotEl = document.getElementById('status-dot');
  const devEl = document.getElementById('val-deviation');
  const profEl = document.getElementById('val-profile');
  const cacheEl = document.getElementById('memory-cache');

  // Haptic feedback for mobile
  const haptic = (pattern) => { if (navigator.vibrate) navigator.vibrate(pattern); };

  // F1 & Humorous Dialogue Matrix
  const evaluateProfile = (error) => {
    // Elite Ranks (F1 Drivers) - Under 1 second margin
    if (error <= 0.015) return "F1 Robot - Are you a machine?";
    if (error <= 0.040) return "Valtteri Bottas - Jumped the lights!";
    if (error <= 0.080) return "Max Verstappen - Absolutely clinical.";
    if (error <= 0.120) return "Carlos Sainz - Smooth operator.";
    if (error <= 0.180) return "Lewis Hamilton - Still got it, Champ.";
    if (error <= 0.250) return "Charles Leclerc - Solid, but pushing it.";
    if (error <= 0.350) return "Fernando Alonso - Veteran instincts.";
    if (error <= 0.500) return "Yuki Tsunoda - Yelling on the team radio.";
    if (error <= 0.750) return "Lance Stroll - Did you check your mirrors?";
    if (error < 1.000) return "Safety Car Driver - Taking in the scenery.";

    // Humorous Ranks - Off by 1 to 20+ seconds
    if (error < 2.000) return "Pit Lane Penalty - 5 Seconds to Ocon.";
    if (error < 3.000) return "Ferrari Pit Wall - 'We are checking...'";
    if (error < 4.000) return "Bono, my tires are gone!";
    if (error < 5.000) return "Haas Upgrades - Still loading...";
    if (error < 6.000) return "Kimi Räikkönen - 'Leave me alone!'";
    if (error < 7.000) return "Red Bull Catering - Distracted by the buffet.";
    if (error < 8.000) return "Monaco Hairpin - Stuck in traffic.";
    if (error < 9.000) return "Daniel Ricciardo - Smiling in last place.";
    if (error < 10.000) return "Alpine Management - Complete collapse.";
    if (error < 11.000) return "Did you even see the lights go out?";
    if (error < 12.000) return "Valtteri's Monaco Pitstop - Still taking the tire off.";
    if (error < 13.000) return "Internet Explorer pacing.";
    if (error < 14.000) return "Grandpa on a Sunday drive.";
    if (error < 15.000) return "VSC Deployed - Way too slow.";
    if (error < 16.000) return "Blue Flags! Let the leaders pass.";
    if (error < 17.000) return "You fell asleep at the wheel. Wake up!";
    if (error < 18.000) return "Are we still racing? Fans went home.";
    if (error < 19.000) return "You missed the entire Grand Prix.";
    if (error < 20.000) return "Engine failure on the formation lap.";
    
    // Anything worse than 20 seconds off
    return "Sir, this is a Wendy's. The race finished yesterday.";
  };

  // Generates random hex codes to distract the user
  const generateNoise = () => {
    let hex = "";
    for(let i = 0; i < 200; i++) {
      hex += Math.floor(Math.random() * 16).toString(16).toUpperCase();
    }
    noiseEl.textContent = hex;
  };

  // UI Updates for LocalStorage
  const renderCache = () => {
    const memory = JSON.parse(localStorage.getItem('sys_chrono_memory') || '[]');
    if(!memory.length) { cacheEl.innerHTML = "<li><span>No Data Yet</span></li>"; return; }
    
    cacheEl.innerHTML = memory.map((entry, index) => {
      const isNew = index === 0 ? "style='color: var(--alert); text-shadow: 0 0 5px var(--alert);'" : "";
      return `<li ${isNew}><span>${entry.time}s</span><span>±${entry.errMs}ms</span></li>`;
    }).join('');
  };

  // Save to LocalStorage
  const logToMemory = (time, errMs) => {
    const memory = JSON.parse(localStorage.getItem('sys_chrono_memory') || '[]');
    memory.unshift({ time, errMs });
    if (memory.length > 5) memory.pop(); // Keep only the last 5
    localStorage.setItem('sys_chrono_memory', JSON.stringify(memory));
    renderCache();
  };

  // Start the blind timer
  const initiateSequence = () => {
    isRunning = true;
    startTime = Date.now();
    
    haptic([40]);
    btnEl.textContent = "STOP";
    btnEl.classList.add('active-state');
    
    statusEl.textContent = "Running";
    statusEl.style.color = "var(--cyan)";
    dotEl.style.backgroundColor = "var(--cyan)";
    dotEl.style.boxShadow = "0 0 10px var(--cyan)";
    
    displayEl.style.display = "none";
    noiseEl.style.display = "block";
    noiseInterval = setInterval(generateNoise, 50);
    
    devEl.textContent = "Calculating...";
    profEl.textContent = "Analyzing...";
  };

  // Stop the timer and calculate precise milliseconds
  const terminateSequence = () => {
    isRunning = false;
    const endTime = Date.now();
    clearInterval(noiseInterval);
    
    haptic([30, 40, 30, 40]);
    btnEl.textContent = "START";
    btnEl.classList.remove('active-state');
    
    statusEl.textContent = "Ready";
    statusEl.style.color = "var(--crimson)";
    dotEl.style.backgroundColor = "var(--crimson)";
    dotEl.style.boxShadow = "0 0 10px var(--crimson)";

    const elapsed = (endTime - startTime) / 1000;
    const deviation = Math.abs(elapsed - targetTime); // Logic kept in seconds for accurate math
    
    const timeStr = elapsed.toFixed(3);
    const devMs = Math.round(deviation * 1000); // Display converted to whole milliseconds

    noiseEl.style.display = "none";
    displayEl.style.display = "block";
    
    displayEl.textContent = `${timeStr}s`;
    devEl.textContent = `± ${devMs}ms`;
    profEl.textContent = evaluateProfile(deviation);

    logToMemory(timeStr, devMs);
  };

  // Event Listener
  btnEl.addEventListener('click', () => isRunning ? terminateSequence() : initiateSequence());

  // Initialize on load
  renderCache();
</script>
</body>
</html>
