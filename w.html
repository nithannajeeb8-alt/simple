<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shattered Book | Interactive Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #020205; /* Deep void color */
            font-family: 'Georgia', serif;
            color: white;
        }

        /* The canvas stays fixed in the background */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Massive scroll container to drive the animation timeline */
        #scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 800vh; /* 8 screens long for pacing */
            z-index: 2;
            pointer-events: none; /* Lets clicks pass through to the 3D canvas */
        }

        /* UI Overlay */
        #ui-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: opacity 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        p.subtitle {
            font-size: 1rem;
            letter-spacing: 2px;
            opacity: 0.7;
            font-family: sans-serif;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        .mouse {
            width: 24px;
            height: 36px;
            border: 2px solid white;
            border-radius: 12px;
            position: relative;
        }

        .wheel {
            width: 4px;
            height: 8px;
            background: white;
            border-radius: 2px;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, 10px); }
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="scroll-container"></div>

    <div id="ui-layer">
        <h1>My Journey</h1>
        <p class="subtitle">Scroll to begin the story</p>
    </div>
    
    <div class="scroll-indicator">
        <div class="mouse"><div class="wheel"></div></div>
        <p style="margin-top: 10px; font-family: sans-serif; font-size: 12px; letter-spacing: 1px;">SCROLL</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // --- 1. CORE SETUP ---
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.04);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0x7aa8ff, 2);
        spotLight.position.set(5, 10, 10);
        spotLight.penumbra = 0.8;
        scene.add(spotLight);

        // --- 3. COOL BACKGROUND (Star/Particle Void) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 60; // Spread across a wide area
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0x5588ff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // --- 4. PROCEDURAL TEXTURE GENERATOR ---
        // Creates readable text as images to paste onto 3D planes
        function createTextTexture(title, bodyText) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // Paper Background
            ctx.fillStyle = '#f4f4f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle paper border
            ctx.strokeStyle = '#dcdcc8';
            ctx.lineWidth = 20;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // Title
            ctx.fillStyle = '#111';
            ctx.font = 'bold 80px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(title, canvas.width / 2, 200);

            // Body Text (simulated word wrap)
            ctx.font = '40px Arial';
            ctx.fillStyle = '#333';
            const words = bodyText.split(' ');
            let line = '';
            let y = 350;

            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > 800 && n > 0) {
                    ctx.fillText(line, canvas.width / 2, y);
                    line = words[n] + ' ';
                    y += 60;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, canvas.width / 2, y);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const paperMaterial = new THREE.MeshStandardMaterial({ color: 0xeae8db, roughness: 0.9, side: THREE.DoubleSide });

        // --- 5. BUILDING THE BOOK ---
        const bookGroup = new THREE.Group();
        scene.add(bookGroup);

        // Cover
        const coverGeo = new THREE.BoxGeometry(5, 7, 0.2);
        const coverMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.5 });
        const cover = new THREE.Mesh(coverGeo, coverMat);
        cover.position.x = 2.5; // Offset so it rotates on the left edge
        
        const coverPivot = new THREE.Group();
        coverPivot.position.x = -2.5;
        coverPivot.add(cover);
        bookGroup.add(coverPivot);

        // Pages
        const pages = [];
        for(let i=0; i<3; i++) {
            const pageGeo = new THREE.PlaneGeometry(4.8, 6.8);
            const pageMesh = new THREE.Mesh(pageGeo, paperMaterial);
            pageMesh.position.x = 2.4; 
            
            const pagePivot = new THREE.Group();
            pagePivot.position.set(-2.5, 0, (i * 0.05) - 0.1); 
            pagePivot.add(pageMesh);
            bookGroup.add(pagePivot);
            pages.push(pagePivot);
        }

        // --- 6. BUILDING THE FRAGMENTS (The Details) ---
        const fragmentsGroup = new THREE.Group();
        fragmentsGroup.visible = false; // Hidden until the tear
        scene.add(fragmentsGroup);

        const fragmentData = [
            { title: "ABOUT ME", body: "I am a creative developer who bridges the gap between design and engineering. I don't just build websites; I craft digital experiences. My work focuses on interactivity, 3D web technologies, and cinematic storytelling." },
            { title: "SKILLS", body: "JavaScript / TypeScript - Three.js & WebGL - GSAP & ScrollTrigger - React & Next.js - Creative Direction - Shader Programming (GLSL) - UI/UX Design - Physics Engines." },
            { title: "PROJECT 01: NEBULA", body: "An interactive cosmic dashboard built for visualizing massive datasets. Utilized React Three Fiber and custom shaders to render 100,000 particles at 60FPS." },
            { title: "PROJECT 02: ECHO", body: "An award-winning e-commerce experience that replaced traditional scroll with a physics-based product playground, increasing user retention by 300%." },
            { title: "CONTACT", body: "Ready to build something impossible? Let's connect. Email: hello@creative.dev | GitHub: @creativeDev | Twitter: @creativeDev" }
        ];

        const interactiveFragments = [];

        // Generate the Large Content Fragments
        fragmentData.forEach((data, index) => {
            const mat = new THREE.MeshStandardMaterial({ 
                map: createTextTexture(data.title, data.body),
                roughness: 0.8,
                side: THREE.DoubleSide
            });
            const geo = new THREE.PlaneGeometry(4, 4);
            const mesh = new THREE.Mesh(geo, mat);
            
            // Random initial clustered positions (before explosion)
            mesh.position.set((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5));
            mesh.userData = { 
                targetZ: (index * -8) - 10, // Depth placement in the void
                targetX: (Math.random() - 0.5) * 8, 
                targetY: (Math.random() - 0.5) * 4,
                rotX: Math.random() * Math.PI,
                rotY: Math.random() * Math.PI,
                isContent: true
            };
            
            fragmentsGroup.add(mesh);
            interactiveFragments.push(mesh);
        });

        // Generate Small Debris
        for(let i=0; i<30; i++) {
            const debrisGeo = new THREE.PlaneGeometry(Math.random() * 1.5, Math.random() * 1.5);
            const debris = new THREE.Mesh(debrisGeo, paperMaterial);
            debris.position.set((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5));
            debris.userData = {
                targetZ: (Math.random() * -40) - 5,
                targetX: (Math.random() - 0.5) * 20,
                targetY: (Math.random() - 0.5) * 20,
                rotX: Math.random() * Math.PI * 2,
                rotY: Math.random() * Math.PI * 2,
                isContent: false
            };
            fragmentsGroup.add(debris);
            interactiveFragments.push(debris);
        }

        // --- 7. SCROLL ANIMATION TIMELINE ---
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1, // Smooth interpolation
                onUpdate: (self) => handleScrollEvents(self.progress)
            }
        });

        // 0-10%: Fade out UI
        tl.to("#ui-layer", { opacity: 0, duration: 1 }, 0);

        // 10-30%: Zoom camera and open cover
        tl.to(camera.position, { z: 9, duration: 2 }, 1);
        tl.to(coverPivot.rotation, { y: -Math.PI / 1.2, duration: 2, ease: "power1.inOut" }, 1);

        // 30-50%: Turn empty pages
        tl.to(pages[0].rotation, { y: -Math.PI / 1.1, duration: 1.5, ease: "power1.inOut" }, 3);
        tl.to(pages[1].rotation, { y: -Math.PI / 1.1, duration: 1.5, ease: "power1.inOut" }, 4.5);

        // 50% SHATTER POINT happens via the onUpdate logic

        // 50-100%: Move camera deep into the void through the fragments
        tl.to(camera.position, { z: -45, duration: 10, ease: "none" }, 6);

        // --- 8. THE SHATTER LOGIC ---
        let shattered = false;

        function handleScrollEvents(progress) {
            // The Tear Event
            if(progress > 0.45 && !shattered) {
                shattered = true;
                
                // Add violent shake
                gsap.to(camera.position, {
                    x: "+=0.3", y: "+=0.3",
                    yoyo: true, repeat: 5, duration: 0.05
                });

                // Swap visibility
                bookGroup.visible = false;
                fragmentsGroup.visible = true;

                // Explode fragments to their target positions
                interactiveFragments.forEach(frag => {
                    gsap.to(frag.position, {
                        x: frag.userData.targetX,
                        y: frag.userData.targetY,
                        z: frag.userData.targetZ,
                        duration: 2.5,
                        ease: "expo.out"
                    });
                    
                    // Settle content fragments so they face the camera, let debris spin randomly
                    gsap.to(frag.rotation, {
                        x: frag.userData.isContent ? 0 : frag.userData.rotX,
                        y: frag.userData.isContent ? 0 : frag.userData.rotY,
                        z: frag.userData.isContent ? 0 : Math.random(),
                        duration: 2.5,
                        ease: "expo.out"
                    });
                });
            } 
            
            // Re-assemble (if user scrolls back up)
            else if (progress < 0.45 && shattered) {
                shattered = false;
                bookGroup.visible = true;
                fragmentsGroup.visible = false;
                
                // Reset fragment positions to origin for next explosion
                interactiveFragments.forEach(frag => {
                    gsap.killTweensOf(frag.position);
                    frag.position.set((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5));
                });
            }

            // Adjust fog color to make the void feel deeper at the end
            const fogColor = new THREE.Color(0x020205).lerp(new THREE.Color(0x1a0a2a), progress);
            scene.fog.color = fogColor;
            renderer.setClearColor(fogColor);
        }

        // --- 9. INTERACTIVITY (Raycasting / Hover) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredFragment = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Parallax particle background based on mouse
            gsap.to(particlesMesh.rotation, {
                x: mouse.y * 0.1,
                y: mouse.x * 0.1,
                duration: 2
            });
        });

        // --- 10. ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Slowly rotate background particles
            particlesMesh.rotation.y += 0.0005;

            // Subtle floating motion for all fragments in the void
            if(shattered) {
                interactiveFragments.forEach((frag, i) => {
                    frag.position.y += Math.sin(elapsedTime * 2 + i) * 0.002;
                    if(!frag.userData.isContent) {
                        frag.rotation.x += 0.002;
                        frag.rotation.y += 0.003;
                    }
                });

                // Raycasting for hover effects on details
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(fragmentsGroup.children);

                if (intersects.length > 0) {
                    const object = intersects[0].object;
                    if (object.userData.isContent && hoveredFragment !== object) {
                        if (hoveredFragment) {
                            gsap.to(hoveredFragment.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                        }
                        hoveredFragment = object;
                        document.body.style.cursor = 'pointer';
                        gsap.to(hoveredFragment.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 0.3, ease: "back.out(2)" });
                    }
                } else {
                    if (hoveredFragment) {
                        gsap.to(hoveredFragment.scale, { x: 1, y: 1, z: 1, duration: 0.3 });
                        hoveredFragment = null;
                        document.body.style.cursor = 'default';
                    }
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // Responsive handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
