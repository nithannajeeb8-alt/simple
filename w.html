<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shattered Book | V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; overflow-x: hidden;
            background-color: #0d0d0d; color: white;
            cursor: default; /* Will change dynamically */
        }
        #webgl-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 1;
        }
        #scroll-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 700vh; z-index: 2;
            pointer-events: none;
        }
        .ui-layer {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 10;
            text-align: center; pointer-events: none;
            transition: opacity 1s ease; font-family: 'Playfair Display', serif;
        }
        h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 5px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        p { font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 3px; opacity: 0.7; }
        
        .progress-bar {
            position: fixed; top: 0; left: 0; height: 4px; background: #fff;
            width: 0%; z-index: 20; transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="progress"></div>
    <canvas id="webgl-canvas"></canvas>
    <div id="scroll-container"></div>
    <div class="ui-layer" id="intro-text">
        <h1>Creative Developer</h1>
        <p>SCROLL TO EXPLORE</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 1. ENGINE SETUP ---
        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0d0d, 0.015);

        const isMobile = window.innerWidth < 768;
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, isMobile ? 24 : 16);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // --- 2. CINEMATIC LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xfff5e6, 1.5);
        spotLight.position.set(10, 20, 15);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        spotLight.shadow.bias = -0.001;
        scene.add(spotLight);

        const fillLight = new THREE.DirectionalLight(0x4a7cff, 0.5); // Cool blue fill
        fillLight.position.set(-10, 0, 5);
        scene.add(fillLight);

        // --- 3. RICH TEXTURE GENERATOR ---
        function createRichPageTexture(title, text, hasImage, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1448;
            const ctx = canvas.getContext('2d');

            // Base Paper
            ctx.fillStyle = '#f0efe9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle border
            ctx.strokeStyle = '#dcdcc8';
            ctx.lineWidth = 15;
            ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);

            // Optional Faux Image (Project Thumbnail)
            let textStartY = 400;
            if (hasImage) {
                ctx.fillStyle = colorHex || '#333';
                ctx.fillRect(100, 150, canvas.width - 200, 450);
                
                // Image frame
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 10;
                ctx.strokeRect(100, 150, canvas.width - 200, 450);
                textStartY = 750;
            }

            // Title
            ctx.fillStyle = '#111';
            ctx.textAlign = 'center';
            ctx.font = 'bold 85px "Playfair Display", serif';
            ctx.fillText(title, canvas.width / 2, textStartY);
            
            // Divider
            ctx.beginPath();
            ctx.moveTo(350, textStartY + 50); ctx.lineTo(674, textStartY + 50);
            ctx.lineWidth = 3; ctx.stroke();

            // Body Text
            ctx.font = '40px "Inter", sans-serif';
            ctx.fillStyle = '#444';
            const words = text.split(' ');
            let line = ''; let y = textStartY + 160;
            
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = ctx.measureText(testLine);
                if (metrics.width > 700 && n > 0) {
                    ctx.fillText(line, canvas.width / 2, y);
                    line = words[n] + ' ';
                    y += 65;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, canvas.width / 2, y);

            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        // --- 4. BOOK ARCHITECTURE ---
        const bookGroup = new THREE.Group();
        scene.add(bookGroup);

        const bW = 5.5, bH = 7.5, bD = 0.6;
        const pivotX = -bW / 2; 

        // Cover
        const coverMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.6 });
        const coverGeo = new THREE.BoxGeometry(bW, bH + 0.3, 0.15);
        const coverMesh = new THREE.Mesh(coverGeo, coverMat);
        coverMesh.position.x = bW / 2;
        coverMesh.castShadow = true;
        
        const coverPivot = new THREE.Group();
        coverPivot.position.set(pivotX, 0, bD/2);
        coverPivot.add(coverMesh);
        bookGroup.add(coverPivot);

        // Spine
        const spineGeo = new THREE.BoxGeometry(0.3, bH + 0.3, bD + 0.3);
        const spineMesh = new THREE.Mesh(spineGeo, coverMat);
        spineMesh.position.set(pivotX, 0, 0);
        spineMesh.castShadow = true;
        bookGroup.add(spineMesh);

        // Portfolio Data
        const portfolioData = [
            { title: "THE BEGINNING", text: "I blend code and design to create immersive digital experiences. Every pixel is intentional. Every animation is governed by physics.", img: false },
            { title: "PROJECT ZERO", text: "An award-winning WebGL data visualization platform. Rendered 500,000 particles at 60FPS using custom GLSL compute shaders.", img: true, color: '#1a365d' },
            { title: "PROJECT ECHO", text: "A physics-based e-commerce storefront. We threw away standard scrolling and replaced it with a tactile, drag-and-drop 3D space.", img: true, color: '#7b341e' },
            { title: "SKILLS", text: "TypeScript • Three.js • React • GSAP • WebGL • Node.js • Creative Direction • UI/UX Design • 3D Modeling.", img: false }
        ];

        const pagePivots = [];
        const pageMeshes = [];
        
        // Wait for fonts
        document.fonts.ready.then(() => {
            portfolioData.forEach((data, i) => {
                const pageMat = new THREE.MeshStandardMaterial({ 
                    map: createRichPageTexture(data.title, data.text, data.img, data.color),
                    roughness: 0.8, side: THREE.DoubleSide
                });
                
                const pageGeo = new THREE.BoxGeometry(bW - 0.2, bH - 0.1, 0.02);
                const pageMesh = new THREE.Mesh(pageGeo, pageMat);
                pageMesh.position.x = (bW - 0.2) / 2;
                pageMesh.castShadow = true;
                pageMesh.receiveShadow = true;
                
                // Store original local transforms for re-assembly
                pageMesh.userData = {
                    originalPos: pageMesh.position.clone(),
                    originalRot: pageMesh.rotation.clone(),
                    isHovered: false
                };
                
                const pagePivot = new THREE.Group();
                pagePivot.position.set(pivotX + 0.15, 0, (bD/2) - 0.15 - (i * 0.12)); 
                pagePivot.add(pageMesh);
                bookGroup.add(pagePivot);
                
                pagePivots.push(pagePivot);
                pageMeshes.push(pageMesh);
            });
        });

        // Initial book rotation
        bookGroup.rotation.set(0.3, -0.4, 0);

        // --- 5. MASTER SCROLL TIMELINE & LOGIC ---
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#scroll-container",
                start: "top top", end: "bottom bottom",
                scrub: 1.2,
                onUpdate: (self) => {
                    document.getElementById('progress').style.width = `${self.progress * 100}%`;
                    handleScrollEvents(self.progress);
                }
            }
        });

        // 0-10%: Intro
        tl.to("#intro-text", { opacity: 0, duration: 0.5 }, 0);
        tl.to(bookGroup.rotation, { x: 0.1, y: -0.1, duration: 1 }, 0);
        tl.to(camera.position, { z: isMobile ? 18 : 12, duration: 1 }, 0);

        // 10-20%: Open Cover
        tl.to(coverPivot.rotation, { y: -Math.PI + 0.1, duration: 1, ease: "power2.inOut" }, 1);

        // 20-60%: Turn Pages sequentially
        tl.to(pagePivots[0]?.rotation || {}, { y: -Math.PI + 0.15, duration: 1, ease: "power2.inOut" }, 2);
        tl.to(pagePivots[1]?.rotation || {}, { y: -Math.PI + 0.20, duration: 1, ease: "power2.inOut" }, 3);
        tl.to(pagePivots[2]?.rotation || {}, { y: -Math.PI + 0.25, duration: 1, ease: "power2.inOut" }, 4);
        tl.to(pagePivots[3]?.rotation || {}, { y: -Math.PI + 0.30, duration: 1, ease: "power2.inOut" }, 5);

        // --- 6. ADVANCED SHATTER & RE-ASSEMBLY ---
        let isShattered = false;

        function handleScrollEvents(progress) {
            const shatterPoint = 0.75;

            // Trigger Shatter
            if (progress > shatterPoint && !isShattered) {
                isShattered = true;
                
                // Dissolve cover and spine
                gsap.to([coverMesh.material, spineMesh.material], { opacity: 0, transparent: true, duration: 0.5 });

                // Vibrate the camera slightly before explosion
                gsap.to(camera.position, { x: "+=0.2", y: "+=0.2", yoyo: true, repeat: 5, duration: 0.05, onComplete: () => {
                    
                    pageMeshes.forEach((mesh, i) => {
                        // 1. Detach from pivot, attach to scene space seamlessly
                        scene.attach(mesh);
                        
                        // 2. Animate to gallery formation
                        const targetX = isMobile ? 0 : (i * 6) - 9;
                        const targetY = isMobile ? (i * -8.5) + 12 : 0;
                        const targetZ = isMobile ? -5 : 0;

                        gsap.to(mesh.position, { x: targetX, y: targetY, z: targetZ, duration: 1.5, ease: "expo.out" });
                        gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 1.5, ease: "expo.out" });
                    });

                    // 3. Move camera to view the gallery
                    gsap.to(camera.position, { x: 0, y: isMobile ? -5 : 0, z: isMobile ? 28 : 22, duration: 2, ease: "power3.out" });
                }});
            } 
            
            // Trigger Re-assembly (Scrolling Back Up)
            else if (progress <= shatterPoint && isShattered) {
                isShattered = false;
                document.body.style.cursor = 'default';

                gsap.to([coverMesh.material, spineMesh.material], { opacity: 1, duration: 1, delay: 0.5 });

                pageMeshes.forEach((mesh, i) => {
                    // 1. Re-attach to its specific pivot in the book hierarchy
                    pagePivots[i].attach(mesh);
                    
                    // 2. Animate back to its original local position and rotation inside the book
                    gsap.to(mesh.position, {
                        x: mesh.userData.originalPos.x,
                        y: mesh.userData.originalPos.y,
                        z: mesh.userData.originalPos.z,
                        duration: 1.5, ease: "power3.inOut"
                    });
                    
                    gsap.to(mesh.rotation, {
                        x: mesh.userData.originalRot.x,
                        y: mesh.userData.originalRot.y,
                        z: mesh.userData.originalRot.z,
                        duration: 1.5, ease: "power3.inOut"
                    });
                });

                // Restore camera to book-view position
                gsap.to(camera.position, {
                    x: 0, y: 0, z: isMobile ? 18 : 12, duration: 2, ease: "power3.inOut"
                });
            }
        }

        // --- 7. INTERACTIVITY (Raycasting in Gallery Mode) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;

        window.addEventListener('mousemove', (event) => {
            // Normalize mouse coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (isShattered) {
                // Parallax for all pages slightly
                pageMeshes.forEach(mesh => {
                    if(!mesh.userData.isHovered) {
                        gsap.to(mesh.rotation, {
                            x: mouse.y * 0.1,
                            y: mouse.x * 0.1,
                            duration: 1
                        });
                    }
                });

                // Raycast for specific hover
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(pageMeshes);

                if (intersects.length > 0) {
                    const object = intersects[0].object;
                    if (hoveredMesh !== object) {
                        if (hoveredMesh) resetHover(hoveredMesh);
                        hoveredMesh = object;
                        hoveredMesh.userData.isHovered = true;
                        document.body.style.cursor = 'pointer';
                        
                        // Bring forward and scale up
                        gsap.to(hoveredMesh.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 0.4, ease: "back.out(1.5)" });
                        gsap.to(hoveredMesh.position, { z: "+=2", duration: 0.4, ease: "power2.out" });
                    }
                } else if (hoveredMesh) {
                    resetHover(hoveredMesh);
                    hoveredMesh = null;
                    document.body.style.cursor = 'default';
                }
            }
        });

        function resetHover(mesh) {
            mesh.userData.isHovered = false;
            gsap.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.4 });
            // Z position gets fixed by the next timeline scrub or parallax update
            gsap.to(mesh.position, { z: isMobile ? -5 : 0, duration: 0.4 }); 
        }

        // --- 8. RENDER LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            // Subtle ambient float in gallery mode
            if (isShattered && !hoveredMesh) {
                pageMeshes.forEach((mesh, i) => {
                    mesh.position.y += Math.sin(time * 2 + i) * 0.003;
                });
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // Responsive handling
        window.addEventListener('resize', () => {
            const newIsMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            
            // Only update base camera if book is NOT shattered
            if(!isShattered) {
                camera.position.z = newIsMobile ? 24 : 16;
            }
            
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
