<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post-Shatter 3D Interactive Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           CSS RESET & BASE STYLES
           ========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #050505;
            --text-color: #f4f4f4;
            --accent-color: #d4af37;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overscroll-behavior: none;
            cursor: none; /* Custom cursor used */
        }

        /* ==========================================
           WEBGL & SCROLL CONTAINERS
           ========================================== */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none; /* Let scroll events pass through */
        }

        /* The scroll proxy area - sets the total scrollable height */
        #scroll-proxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1200vh; /* Massive scroll area for pacing */
            z-index: 2;
        }

        /* ==========================================
           UI OVERLAY
           ========================================== */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            mix-blend-mode: difference;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo { font-size: 1.2rem; font-weight: 600; }
        .nav-info { font-size: 0.8rem; opacity: 0.7; }

        .scroll-indicator {
            align-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .mouse-icon {
            width: 20px;
            height: 30px;
            border: 1px solid white;
            border-radius: 15px;
            position: relative;
        }

        .wheel {
            width: 2px;
            height: 6px;
            background: white;
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            animation: scroll 2s infinite cubic-bezier(0.15, 0.41, 0.69, 0.94);
        }

        @keyframes scroll {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 15px); }
        }

        /* ==========================================
           LOADING SCREEN
           ========================================== */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .loader-text {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--text-color);
            transition: width 0.1s ease;
        }

        /* ==========================================
           CUSTOM CURSOR
           ========================================== */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="loader-text">Curating Experience</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <div id="ui-layer">
        <header>
            <div class="logo">Studio Void</div>
            <div class="nav-info">WebGL Masterpiece Portfolio</div>
        </header>
        <div class="scroll-indicator">
            <span>Discover</span>
            <div class="mouse-icon"><div class="wheel"></div></div>
        </div>
    </div>

    <div id="webgl-container"></div>
    
    <div id="scroll-proxy"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

        /* =====================================================================
           PART 1: ARCHITECTURE & STATE
           ===================================================================== */
        
        // Register GSAP plugins
        gsap.registerPlugin(ScrollTrigger);

        const CONFIG = {
            pages: 7, // Total pages (including covers)
            pageWidth: 5,
            pageHeight: 7,
            pageSegments: 32, // High res for bending
            textureWidth: 1024,
            textureHeight: 1433,
            bookDepth: 0.5,
            cameraZ: 14, // How far the camera is
            readZ: 8     // The Z-coordinate when a page is in the center screen for reading
        };

        const STATE = {
            loaded: false,
            pointer: new THREE.Vector2(),
            targetPointer: new THREE.Vector2(),
            windowWidth: window.innerWidth,
            windowHeight: window.innerHeight
        };

        // Data for the procedural canvas layout generator
        // Using high-end Unsplash URLs
        const PAGE_DATA = [
            { type: 'cover', title: 'PORTFOLIO', subtitle: 'VOL. I' },
            { type: 'manifesto', title: 'THE VISION', body: 'Design is not just what it looks like and feels like. Design is how it works. In a sea of digital noise, we strive to create calm, functional, and aesthetically uncompromising interactive experiences.', img: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=1000' },
            { type: 'project', title: 'AURAL', category: 'Sound Design', body: 'A study in acoustic architecture and digital frequency visualization.', img: 'https://images.unsplash.com/photo-1507146426996-ef05306b995a?q=80&w=1000' },
            { type: 'project', title: 'LUMEN', category: 'Photography', body: 'Capturing the interplay of stark shadows and brutalist structures.', img: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1000' },
            { type: 'project', title: 'NEXUS', category: 'Web App', body: 'A seamless, editorial-driven e-commerce platform for high-end fashion.', img: 'https://images.unsplash.com/photo-1449247709967-d4461a6a6103?q=80&w=1000' },
            { type: 'project', title: 'VOID', category: 'Experiential', body: 'Embracing emptiness as a primary design canvas.', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000' },
            { type: 'back_cover', title: 'END', subtitle: '2026' }
        ];

        /* =====================================================================
           PART 2: PROCEDURAL TEXTURE GENERATOR (CANVAS 2D API)
           ===================================================================== */
        
        // Utility to wrap text on Canvas
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let currentY = y;

            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                let testWidth = metrics.width;
                if (testWidth > maxWidth && n > 0) {
                    context.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += lineHeight;
                }
                else {
                    line = testLine;
                }
            }
            context.fillText(line, x, currentY);
            return currentY + lineHeight;
        }

        // Cache images to avoid CORS re-fetching
        const imageCache = {};
        async function loadImage(url) {
            if (imageCache[url]) return imageCache[url];
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous"; // CRITICAL for WebGL
                img.onload = () => { imageCache[url] = img; resolve(img); };
                img.onerror = () => reject(new Error(`Failed to load ${url}`));
                img.src = url;
            });
        }

        async function createPageTexture(data, index) {
            const canvas = document.createElement('canvas');
            canvas.width = CONFIG.textureWidth;
            canvas.height = CONFIG.textureHeight;
            const ctx = canvas.getContext('2d');

            // Base paper color (off-white/cream)
            ctx.fillStyle = (data.type === 'cover' || data.type === 'back_cover') ? '#1a1a1a' : '#f0ece1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add procedural noise/grain to paper
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imgData.data;
            for (let i = 0; i < pixels.length; i += 4) {
                const noise = (Math.random() - 0.5) * 15;
                pixels[i] = Math.max(0, Math.min(255, pixels[i] + noise));
                pixels[i+1] = Math.max(0, Math.min(255, pixels[i+1] + noise));
                pixels[i+2] = Math.max(0, Math.min(255, pixels[i+2] + noise));
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw based on page type
            if (data.type === 'cover' || data.type === 'back_cover') {
                ctx.fillStyle = '#d4af37'; // Gold foil accent
                ctx.textAlign = 'center';
                
                // Border
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 4;
                ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);
                
                ctx.font = '800 100px "Cinzel"';
                ctx.fillText(data.title, canvas.width / 2, canvas.height / 2);
                
                ctx.font = '400 30px "Inter"';
                ctx.letterSpacing = '10px';
                ctx.fillText(data.subtitle, canvas.width / 2, canvas.height / 2 + 100);
            } 
            else if (data.type === 'manifesto') {
                ctx.fillStyle = '#111';
                ctx.textAlign = 'left';
                
                ctx.font = '700 80px "Playfair Display"';
                ctx.fillText(data.title, 100, 200);

                ctx.font = '300 40px "Inter"';
                wrapText(ctx, data.body, 100, 350, canvas.width - 200, 60);

                if (data.img) {
                    try {
                        const img = await loadImage(data.img);
                        // Draw grayscale high-contrast
                        ctx.filter = 'grayscale(100%) contrast(120%)';
                        ctx.drawImage(img, 100, canvas.height - 600, canvas.width - 200, 500);
                        ctx.filter = 'none';
                    } catch(e) { console.warn(e); }
                }
                
                // Page Number
                ctx.font = '400 24px "Inter"';
                ctx.fillText(`0${index}`, canvas.width - 120, canvas.height - 80);
            }
            else if (data.type === 'project') {
                // Polaroid / Magazine layout
                if (data.img) {
                    try {
                        const img = await loadImage(data.img);
                        ctx.drawImage(img, 80, 80, canvas.width - 160, canvas.height * 0.55);
                    } catch(e) { console.warn(e); }
                }

                ctx.fillStyle = '#111';
                ctx.textAlign = 'left';
                
                ctx.font = '600 24px "Inter"';
                ctx.fillText(data.category.toUpperCase(), 80, canvas.height * 0.55 + 140);

                ctx.font = 'italic 700 90px "Playfair Display"';
                ctx.fillText(data.title, 80, canvas.height * 0.55 + 230);

                ctx.font = '300 32px "Inter"';
                wrapText(ctx, data.body, 80, canvas.height * 0.55 + 300, canvas.width - 160, 48);

                // Page Number
                ctx.font = '400 24px "Inter"';
                ctx.fillText(`0${index}`, canvas.width - 120, canvas.height - 80);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = 16;
            return texture;
        }

        /* =====================================================================
           PART 3: THREE.JS SCENE SETUP
           ===================================================================== */
        
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, CONFIG.cameraZ);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize performance
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lighting (Cinematic Studio Setup)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xfff0dd, 5);
        spotLight.position.set(10, 15, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        scene.add(spotLight);

        const fillLight = new THREE.DirectionalLight(0xaabbff, 1.5);
        fillLight.position.set(-10, -5, 10);
        scene.add(fillLight);

        /* =====================================================================
           PART 4: POST-PROCESSING
           ===================================================================== */
        
        const renderScene = new RenderPass(scene, camera);
        
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.1, 0.8);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 0.6; // High-end soft glow
        bloomPass.radius = 0.5;

        const filmPass = new FilmPass(0.35, 0.025, 648, false); // Grain

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(filmPass);

        /* =====================================================================
           PART 5: MESH GENERATION (THE BOOK & PAGES)
           ===================================================================== */
        
        const bookGroup = new THREE.Group();
        scene.add(bookGroup);
        
        // We need an array to hold the page groups for individual control later
        const pageGroups = [];
        
        // Common geometries
        const pageGeometry = new THREE.PlaneGeometry(CONFIG.pageWidth, CONFIG.pageHeight, CONFIG.pageSegments, CONFIG.pageSegments);
        const coverGeometry = new THREE.BoxGeometry(CONFIG.pageWidth, CONFIG.pageHeight, 0.1);

        // Materials (Base materials, textures applied after loading)
        const defaultMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.8 });
        
        async function buildBook() {
            for (let i = 0; i < CONFIG.pages; i++) {
                // Each page needs a pivot point at its left edge to act like a spine
                const pivot = new THREE.Group();
                // Position pivot initially at center, we will shift it
                
                let mesh;
                if (i === 0 || i === CONFIG.pages - 1) {
                    // Cover
                    mesh = new THREE.Mesh(coverGeometry, defaultMaterial.clone());
                    // Shift mesh so its left edge is at x=0 relative to pivot
                    mesh.position.set(CONFIG.pageWidth / 2, 0, 0); 
                } else {
                    // Inside Page
                    mesh = new THREE.Mesh(pageGeometry, defaultMaterial.clone());
                    mesh.position.set(CONFIG.pageWidth / 2, 0, 0);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                }

                // Small Z offset to prevent Z-fighting when closed
                const zOffset = (i - CONFIG.pages / 2) * -0.05;
                pivot.position.set(-CONFIG.pageWidth / 2, 0, zOffset); // Move entire pivot left

                pivot.add(mesh);
                bookGroup.add(pivot);
                pageGroups.push(pivot);

                // Start loading texture concurrently
                createPageTexture(PAGE_DATA[i], i).then(texture => {
                    if (mesh.geometry.type === 'BoxGeometry') {
                        const materials = [
                            defaultMaterial, defaultMaterial, defaultMaterial, defaultMaterial,
                            new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4, metalness: 0.1 }), // Front
                            defaultMaterial // Back
                        ];
                        mesh.material = materials;
                    } else {
                        mesh.material = new THREE.MeshStandardMaterial({ 
                            map: texture, 
                            side: THREE.DoubleSide,
                            roughness: 0.9 
                        });
                    }
                    updateProgress(i + 1, CONFIG.pages);
                });
            }
            
            // Adjust Book Group position to center it
            bookGroup.rotation.y = -Math.PI / 8; // Angled slightly for depth
            bookGroup.rotation.x = Math.PI / 12;
        }

        /* =====================================================================
           PART 6: LOADING MANAGER
           ===================================================================== */
        
        const progressBar = document.getElementById('progress-fill');
        const loaderUI = document.getElementById('loader');
        
        function updateProgress(current, total) {
            const percent = (current / total) * 100;
            progressBar.style.width = percent + '%';
            
            if (current === total) {
                setTimeout(() => {
                    loaderUI.style.opacity = '0';
                    setTimeout(() => {
                        loaderUI.style.display = 'none';
                        initAnimations(); // Start ScrollTrigger only after load
                        STATE.loaded = true;
                    }, 1000);
                }, 800);
            }
        }

        /* =====================================================================
           PART 7: GSAP SCROLL & SHATTER LOGIC (THE MASTERPIECE)
           ===================================================================== */
        
        function initAnimations() {
            // Main Timeline tied to the scroll proxy
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-proxy",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5, // Smooth, premium easing on scrub
                }
            });

            // PHASE 1: 0% - 30% -> Book interaction (rotate, fan pages slightly)
            tl.to(bookGroup.rotation, {
                y: Math.PI / 6,
                x: 0,
                duration: 2,
                ease: "power2.inOut"
            }, 0);
            
            tl.to(bookGroup.position, {
                z: 2, // Move closer
                duration: 2,
                ease: "power2.inOut"
            }, 0);

            // Fan out pages slightly
            pageGroups.forEach((page, i) => {
                if(i !== 0 && i !== CONFIG.pages - 1) {
                    tl.to(page.rotation, {
                        y: -Math.PI / (12 + i * 2),
                        duration: 2,
                        ease: "power2.inOut"
                    }, 0);
                }
            });

            // PHASE 2: 30% - 50% -> THE SHATTER
            // Book explodes into the void
            const shatterDuration = 3;
            const shatterStartTime = 2; // Starts at timeline time 2

            // Background dims
            tl.to(scene.fog, { density: 0.05, duration: shatterDuration, ease: "power2.inOut" }, shatterStartTime);
            
            // Randomize scattered positions
            const scatterData = [];
            pageGroups.forEach((page, i) => {
                const rx = (Math.random() - 0.5) * 15;
                const ry = (Math.random() - 0.5) * 15;
                const rz = -15 + (Math.random() - 0.5) * 10;
                
                const rotX = Math.random() * Math.PI;
                const rotY = Math.random() * Math.PI;
                const rotZ = Math.random() * Math.PI;

                scatterData.push({ x: rx, y: ry, z: rz, rotX, rotY, rotZ });

                tl.to(page.position, {
                    x: rx, y: ry, z: rz,
                    duration: shatterDuration,
                    ease: "expo.out" // Explosive easing
                }, shatterStartTime);

                tl.to(page.rotation, {
                    x: rotX, y: rotY, z: rotZ,
                    duration: shatterDuration,
                    ease: "expo.out"
                }, shatterStartTime);
                
                // Reset internal mesh position (remove spine offset)
                const mesh = page.children[0];
                tl.to(mesh.position, {
                    x: 0, y: 0, z: 0,
                    duration: shatterDuration,
                    ease: "expo.out"
                }, shatterStartTime);
            });

            // PHASE 3: 50% - 100% -> SEQUENTIAL FOCUS
            // Bring each page to the center, readable, then push back.
            const sequenceStartTime = shatterStartTime + shatterDuration; // Time = 5
            const readDuration = 2; // How long it stays in center relative to timeline
            const transitionDuration = 1.5;

            pageGroups.forEach((page, i) => {
                const stepStart = sequenceStartTime + (i * (readDuration + transitionDuration));
                
                // Fly IN to center screen
                tl.to(page.position, {
                    x: 0,
                    y: 0,
                    z: CONFIG.readZ, // Bring close to camera
                    duration: transitionDuration,
                    ease: "power3.inOut" // Premium smooth ease
                }, stepStart);

                tl.to(page.rotation, {
                    x: 0,
                    y: 0,
                    z: 0, // Face camera perfectly
                    duration: transitionDuration,
                    ease: "power3.inOut"
                }, stepStart);

                // Hold in center (implicit, as next animation starts later)
                
                // Fly OUT (if not the very last page, or even the last page can fly out)
                const stepOut = stepStart + transitionDuration + readDuration;
                if (i < CONFIG.pages - 1) {
                    tl.to(page.position, {
                        x: 0,
                        y: 10, // Fly up and away
                        z: -5,
                        duration: transitionDuration,
                        ease: "power3.in"
                    }, stepOut);
                    
                    tl.to(page.rotation, {
                        x: Math.PI / 4,
                        duration: transitionDuration,
                        ease: "power3.in"
                    }, stepOut);
                } else {
                    // Final page stays, or slowly drifts
                    tl.to(page.position, {
                        z: CONFIG.readZ - 1,
                        duration: transitionDuration + readDuration,
                        ease: "sine.inOut"
                    }, stepOut);
                }
            });
        }

        /* =====================================================================
           PART 8: MOUSE INTERACTION & CURSOR (PARALLAX + UI)
           ===================================================================== */
        
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', (e) => {
            // Normalized Device Coordinates for Three.js Parallax
            STATE.targetPointer.x = (e.clientX / STATE.windowWidth) * 2 - 1;
            STATE.targetPointer.y = -(e.clientY / STATE.windowHeight) * 2 + 1;

            // DOM Cursor updates
            cursorDot.style.left = `${e.clientX}px`;
            cursorDot.style.top = `${e.clientY}px`;
            
            // Lagging outline
            cursorOutline.animate({
                left: `${e.clientX}px`,
                top: `${e.clientY}px`
            }, { duration: 500, fill: "forwards", easing: "ease" });
        });

        // Hover effects for a premium feel
        document.querySelectorAll('a, button, .mouse-icon').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorOutline.style.transform = 'translate(-50%, -50%) scale(1.5)';
                cursorOutline.style.backgroundColor = 'rgba(255,255,255,0.1)';
            });
            el.addEventListener('mouseleave', () => {
                cursorOutline.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorOutline.style.backgroundColor = 'transparent';
            });
        });

        /* =====================================================================
           PART 9: RESIZE HANDLER (RESPONSIVE CENTERING)
           ===================================================================== */
        
        window.addEventListener('resize', () => {
            STATE.windowWidth = window.innerWidth;
            STATE.windowHeight = window.innerHeight;

            camera.aspect = STATE.windowWidth / STATE.windowHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(STATE.windowWidth, STATE.windowHeight);
            composer.setSize(STATE.windowWidth, STATE.windowHeight);

            // Dynamically adjust readZ for mobile to fit the portrait canvas
            if (STATE.windowWidth < 768) {
                // Move camera further back conceptually by making readZ lower
                CONFIG.readZ = 5; 
            } else {
                CONFIG.readZ = 8;
            }
            
            // Note: Since ScrollTrigger calculates based on timeline, 
            // a full re-init of GSAP might be required for robust mobile rotation, 
            // but ScrollTrigger.refresh() handles most proxy resizing perfectly.
            ScrollTrigger.refresh();
        });

        /* =====================================================================
           PART 10: RENDER LOOP
           ===================================================================== */
        
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Parallax camera movement based on mouse
            if (STATE.loaded) {
                // Smoothly interpolate pointer
                STATE.pointer.x += (STATE.targetPointer.x - STATE.pointer.x) * 0.05;
                STATE.pointer.y += (STATE.targetPointer.y - STATE.pointer.y) * 0.05;

                // Subtle camera drift
                camera.position.x = STATE.pointer.x * 0.5;
                camera.position.y = STATE.pointer.y * 0.5;
                camera.lookAt(0, 0, 0);
            }

            // Render post-processing instead of standard renderer
            composer.render(delta);
        }

        // Initialize Everything
        buildBook();
        animate();

    </script>
</body>
</html>
