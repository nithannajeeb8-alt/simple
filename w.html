<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="A cinematic 3D WebGL interactive portfolio experience.">
    <title>Post-Shatter 3D Portfolio | Mobile Optimized</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        /* =====================================================================
           1. CSS RESET, BASE STYLES & VARIABLES
           ===================================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #030303;
            --text-color: #eaeaea;
            --accent-color: #e5c158;
            --ui-font: 'Inter', sans-serif;
            --title-font: 'Cinzel', serif;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--ui-font);
            overflow-x: hidden; overscroll-behavior: none;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }

        /* Hide default cursor on desktop for custom cursor */
        @media (pointer: fine) { body { cursor: none; } }

        /* =====================================================================
           2. WEBGL & SCROLL CONTAINERS
           ===================================================================== */
        #webgl-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* Scroll proxy dictates the timeline length. 
           1500vh ensures extremely smooth scrubbing across 12 pages.
        */
        #scroll-proxy {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 1500vh; z-index: 2;
        }

        /* =====================================================================
           3. UI OVERLAY & NAVIGATION
           ===================================================================== */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 2.5rem; mix-blend-mode: difference;
        }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .logo-container { display: flex; flex-direction: column; gap: 5px; }
        .logo { font-family: var(--title-font); font-size: 1.4rem; font-weight: 800; }
        .logo-sub { font-size: 0.65rem; opacity: 0.6; letter-spacing: 4px; }
        
        .controls { display: flex; gap: 20px; pointer-events: auto; }
        .btn-audio { 
            background: none; border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 0.7rem; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-audio:hover { background: white; color: black; }

        .footer-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        .coordinates { font-size: 0.65rem; opacity: 0.5; font-variant-numeric: tabular-nums; }

        /* Custom Scroll Indicator */
        .scroll-indicator {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8;
        }
        .mouse-icon {
            width: 18px; height: 28px; border: 1.5px solid white; border-radius: 10px; position: relative;
        }
        .wheel {
            width: 2px; height: 4px; background: white; position: absolute;
            top: 5px; left: 50%; transform: translateX(-50%); border-radius: 2px;
            animation: scroll-anim 2s infinite cubic-bezier(0.15, 0.41, 0.69, 0.94);
        }
        @keyframes scroll-anim {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 12px); }
        }

        /* =====================================================================
           4. MULTI-STAGE LOADING SCREEN
           ===================================================================== */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .loader-content { text-align: center; width: 100%; max-width: 400px; padding: 0 20px; }
        .loader-title {
            font-family: var(--title-font); font-size: 2.5rem; margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .loader-detail { font-size: 0.75rem; letter-spacing: 2px; opacity: 0.5; margin-bottom: 40px; height: 15px; }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 15px; }
        .progress-bar { flex-grow: 1; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--accent-color); transition: width 0.3s ease; }
        .progress-text { font-size: 0.7rem; font-variant-numeric: tabular-nums; width: 35px; text-align: right; }

        .enter-btn {
            margin-top: 40px; padding: 12px 30px; background: white; color: black;
            border: none; border-radius: 30px; font-family: var(--ui-font); font-size: 0.8rem;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            opacity: 0; transform: translateY(10px); transition: all 0.5s ease;
        }
        .enter-btn.visible { opacity: 1; transform: translateY(0); }
        .enter-btn:hover { background: var(--accent-color); color: white; }

        /* =====================================================================
           5. CUSTOM CURSOR
           ===================================================================== */
        @media (pointer: fine) {
            .cursor-dot {
                position: fixed; top: 0; left: 0; width: 4px; height: 4px;
                background: white; border-radius: 50%; pointer-events: none; z-index: 10000;
                transform: translate(-50%, -50%);
            }
            .cursor-outline {
                position: fixed; top: 0; left: 0; width: 36px; height: 36px;
                border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
                pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
                transition: width 0.2s, height 0.2s, background-color 0.2s;
            }
        }
        @media (pointer: coarse) { .cursor-dot, .cursor-outline { display: none; } }

        /* =====================================================================
           6. ACCESSIBILITY / SEO LAYER (Screen Reader Only)
           ===================================================================== */
        #seo-layer {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }

        /* =====================================================================
           7. MOBILE OPTIMIZATIONS (RESPONSIVE UI)
           ===================================================================== */
        @media (max-width: 768px) {
            #ui-layer { padding: 1.5rem; }
            .logo { font-size: 1.1rem; }
            .btn-audio { padding: 6px 12px; font-size: 0.6rem; }
            .coordinates { display: none; } /* Hide on small screens */
            .loader-title { font-size: 1.8rem; }
        }
    </style>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';

        gsap.registerPlugin(ScrollTrigger);

        /* ---------------------------------------------------------------------
           CONFIG & STATE MANAGEMENT
           --------------------------------------------------------------------- */
        const isMobile = window.innerWidth <= 768;
        const isTablet = window.innerWidth > 768 && window.innerWidth <= 1024;

        const CONFIG = {
            pages: 12, // Expanded to 12 pages for a longer journey
            pageWidth: 5,
            pageHeight: 7,
            pageSegments: isMobile ? 16 : 48, // Lower geometry resolution on mobile
            textureWidth: 1024,
            textureHeight: 1433,
            bookDepth: 0.6,
            cameraZ: isMobile ? 18 : 14, // Wider view on mobile to fit elements
            readZ: isMobile ? 6 : 8,     // Reading distance adjusted for screen size
            enablePostProcessing: !isMobile, // Disable heavy bloom on mobile for FPS
            useGyroscope: isMobile || isTablet
        };

        const STATE = {
            loaded: false,
            pointer: new THREE.Vector2(),
            targetPointer: new THREE.Vector2(),
            gyro: new THREE.Vector2(),
            targetGyro: new THREE.Vector2(),
            scrollProgress: 0,
            activePage: -1,
            audioEnabled: false
        };

        /* ---------------------------------------------------------------------
           EXPANDED PORTFOLIO CONTENT DATA
           --------------------------------------------------------------------- */
        const PAGE_DATA = [
            { type: 'cover', title: 'STUDIO VOID', subtitle: 'THE ARCHITECTURE OF INTERACTION', theme: 'dark' },
            { type: 'manifesto', title: '01. ETHOS', body: 'We inhabit a digital space saturated with noise. Our philosophy is subtraction. By stripping away the superfluous, we reveal the core essence of digital interaction. Function dictates form; performance dictates design.', img: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1000' },
            { type: 'wireframe', title: '02. STRUCTURE', subtitle: 'GRID SYSTEMS', body: 'Every composition begins with geometry. We utilize algorithmic grid systems to ensure perfect proportional harmony across all viewports.', shape: 'grid' },
            { type: 'project', title: 'AURAL', category: 'Sound Design & WebGL', body: 'A study in acoustic architecture. Visualizing audio frequencies in real-time using custom GLSL shaders and the Web Audio API.', img: 'https://images.unsplash.com/photo-1507146426996-ef05306b995a?q=80&w=1000' },
            { type: 'project', title: 'LUMEN', category: 'Photography / Lighting', body: 'Capturing the interplay of stark shadows and brutalist structures. A full-screen immersive gallery utilizing raymarched lighting.', img: 'https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=1000' },
            { type: 'chart', title: '03. METRICS', category: 'Performance', body: 'Optimizing for 60fps on mobile architectures requires deep memory management and draw-call reduction.', chartData: [85, 45, 90, 30, 65, 100] },
            { type: 'project', title: 'NEXUS', category: 'E-Commerce', body: 'A seamless, editorial-driven e-commerce platform for high-end fashion. Integrating WebGL product viewers with minimal UI.', img: 'https://images.unsplash.com/photo-1449247709967-d4461a6a6103?q=80&w=1000' },
            { type: 'wireframe', title: '04. TOPOLOGY', subtitle: 'MESH DENSITY', body: 'Balancing geometric complexity with rendering overhead. Utilizing LOD (Level of Detail) algorithms for fluid interactions.', shape: 'sphere' },
            { type: 'project', title: 'ECHO', category: 'Experiential', body: 'An award-winning interactive documentary exploring abandoned spaces through LiDAR scans and point cloud rendering.', img: 'https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?q=80&w=1000' },
            { type: 'manifesto', title: '05. THE VOID', body: 'Embracing emptiness as a primary design canvas. White space is not a lack of content; it is the structural framework that allows content to breathe and command attention.', img: null },
            { type: 'project', title: 'KINETIC', category: 'Typography', body: 'Procedural typography generation. Treating type as flexible geometry rather than static rasterized assets.', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000' },
            { type: 'back_cover', title: 'FINIS', subtitle: 'EST. 2026', theme: 'dark' }
        ];

        /* ---------------------------------------------------------------------
           PROCEDURAL WEB AUDIO SYNTHESIZER
           Native browser audio generation - No MP3s required.
           --------------------------------------------------------------------- */
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.masterGain = null;
                this.droneOsc = null;
                this.droneGain = null;
                this.filter = null;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.5;
                this.masterGain.connect(this.ctx.destination);

                // Ambient Drone Setup
                this.droneOsc = this.ctx.createOscillator();
                this.droneOsc.type = 'sine';
                this.droneOsc.frequency.value = 55; // Low A note

                this.filter = this.ctx.createBiquadFilter();
                this.filter.type = 'lowpass';
                this.filter.frequency.value = 200;
                this.filter.Q.value = 1;

                this.droneGain = this.ctx.createGain();
                this.droneGain.gain.value = 0; // Starts silent

                this.droneOsc.connect(this.filter);
                this.filter.connect(this.droneGain);
                this.droneGain.connect(this.masterGain);
                this.droneOsc.start();

                this.initialized = true;
            }

            startDrone() {
                if (!this.initialized) return;
                this.droneGain.gain.setTargetAtTime(0.2, this.ctx.currentTime, 2); // Fade in
            }

            stopDrone() {
                if (!this.initialized) return;
                this.droneGain.gain.setTargetAtTime(0, this.ctx.currentTime, 1); // Fade out
            }

            // Synthesize a "Whoosh" sound for page flying
            playWhoosh(intensity = 1) {
                if (!this.initialized || !STATE.audioEnabled) return;
                
                const bufferSize = this.ctx.sampleRate * 1.5; 
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                // Generate pink noise
                let b0, b1, b2, b3, b4, b5, b6;
                b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    data[i] *= 0.11; // compensation
                    b6 = white * 0.115926;
                }

                const noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                // Sweep frequency based on intensity
                filter.frequency.setValueAtTime(100, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(800 * intensity, this.ctx.currentTime + 0.3);
                filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 1.0);

                const gainNode = this.ctx.createGain();
                gainNode.gain.setValueAtTime(0, this.ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 0.2);
                gainNode.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.0);

                noiseSource.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                noiseSource.start();
                noiseSource.stop(this.ctx.currentTime + 1.2);
            }

            playClick() {
                if (!this.initialized || !STATE.audioEnabled) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }
        }
        
        const audio = new AudioEngine();

        // Audio UI Toggle
        const btnAudio = document.getElementById('btn-audio');
        btnAudio.addEventListener('click', () => {
            if (!audio.initialized) {
                audio.init();
            }
            STATE.audioEnabled = !STATE.audioEnabled;
            if (STATE.audioEnabled) {
                btnAudio.textContent = 'Audio: On';
                audio.startDrone();
                audio.playClick();
            } else {
                btnAudio.textContent = 'Audio: Off';
                audio.stopDrone();
            }
        });

        /* ---------------------------------------------------------------------
           ADVANCED CANVAS RENDERING ENGINE
           Mini-browser logic to draw text, grids, charts, and masked images
           --------------------------------------------------------------------- */
        class CanvasRenderer {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.imageCache = {};
            }

            async loadImage(url) {
                if (!url) return null;
                if (this.imageCache[url]) return this.imageCache[url];
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => { this.imageCache[url] = img; resolve(img); };
                    img.onerror = () => reject(new Error(`Failed to load ${url}`));
                    img.src = url;
                });
            }

            // Word wrap with line height and max width
            wrapText(ctx, text, x, y, maxWidth, lineHeight) {
                const words = text.split(' ');
                let line = '';
                let currentY = y;
                for(let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) {
                        ctx.fillText(line, x, currentY);
                        line = words[n] + ' ';
                        currentY += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                ctx.fillText(line, x, currentY);
                return currentY + lineHeight;
            }

            drawNoise(ctx) {
                // Procedural paper grain
                const imgData = ctx.getImageData(0, 0, this.width, this.height);
                const pixels = imgData.data;
                for (let i = 0; i < pixels.length; i += 4) {
                    const noise = (Math.random() - 0.5) * 12;
                    pixels[i] = Math.min(255, Math.max(0, pixels[i] + noise));
                    pixels[i+1] = Math.min(255, Math.max(0, pixels[i+1] + noise));
                    pixels[i+2] = Math.min(255, Math.max(0, pixels[i+2] + noise));
                }
                ctx.putImageData(imgData, 0, 0);
            }

            drawGridShape(ctx, x, y, size) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                const steps = 10;
                const stepSize = size / steps;
                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    ctx.moveTo(x + i * stepSize, y);
                    ctx.lineTo(x + i * stepSize, y + size);
                    ctx.moveTo(x, y + i * stepSize);
                    ctx.lineTo(x + size, y + i * stepSize);
                }
                ctx.stroke();
            }

            drawWireframeSphere(ctx, cx, cy, radius) {
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1.5;
                for(let i=0; i<8; i++) {
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, radius, radius * Math.abs(Math.cos(i * Math.PI/8)), 0, 0, 2*Math.PI);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, radius * Math.abs(Math.cos(i * Math.PI/8)), radius, 0, 0, 2*Math.PI);
                    ctx.stroke();
                }
            }

            drawChart(ctx, data, x, y, width, height) {
                ctx.fillStyle = '#111';
                ctx.fillRect(x, y, width, height);
                
                const barWidth = width / data.length;
                const maxVal = Math.max(...data);
                
                data.forEach((val, i) => {
                    const barHeight = (val / maxVal) * (height - 40);
                    ctx.fillStyle = i % 2 === 0 ? '#d4af37' : '#fff';
                    ctx.fillRect(x + (i * barWidth) + 10, y + height - barHeight - 20, barWidth - 20, barHeight);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = '300 20px "Inter"';
                    ctx.textAlign = 'center';
                    ctx.fillText(val.toString(), x + (i * barWidth) + barWidth/2, y + height - barHeight - 30);
                });
            }

            async generatePage(data, index) {
                const canvas = document.createElement('canvas');
                canvas.width = this.width;
                canvas.height = this.height;
                const ctx = canvas.getContext('2d');

                // Base Colors
                const isDark = data.theme === 'dark';
                const bgColor = isDark ? '#121212' : '#f0ece1';
                const textColor = isDark ? '#e5c158' : '#111';
                const subTextColor = isDark ? '#fff' : '#444';

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                this.drawNoise(ctx); // Apply grain

                // Layout Engine based on type
                if (data.type === 'cover' || data.type === 'back_cover') {
                    ctx.strokeStyle = textColor;
                    ctx.lineWidth = 6;
                    ctx.strokeRect(60, 60, canvas.width - 120, canvas.height - 120);
                    ctx.strokeRect(75, 75, canvas.width - 150, canvas.height - 150);
                    
                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'center';
                    ctx.font = '800 110px "Cinzel"';
                    ctx.fillText(data.title, canvas.width / 2, canvas.height / 2);
                    
                    ctx.fillStyle = subTextColor;
                    ctx.font = '400 32px "Inter"';
                    ctx.letterSpacing = '12px';
                    ctx.fillText(data.subtitle, canvas.width / 2, canvas.height / 2 + 100);
                } 
                else if (data.type === 'manifesto') {
                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'left';
                    ctx.font = '700 90px "Playfair Display"';
                    ctx.fillText(data.title, 100, 220);

                    ctx.fillStyle = subTextColor;
                    ctx.font = '300 42px "Inter"';
                    this.wrapText(ctx, data.body, 100, 380, canvas.width - 200, 65);

                    if (data.img) {
                        try {
                            const img = await this.loadImage(data.img);
                            ctx.filter = 'grayscale(100%) contrast(130%)';
                            ctx.drawImage(img, 100, canvas.height - 650, canvas.width - 200, 500);
                            ctx.filter = 'none';
                        } catch(e) {}
                    }
                }
                else if (data.type === 'project') {
                    if (data.img) {
                        try {
                            const img = await this.loadImage(data.img);
                            ctx.drawImage(img, 80, 80, canvas.width - 160, canvas.height * 0.52);
                        } catch(e) {}
                    }

                    ctx.fillStyle = subTextColor;
                    ctx.textAlign = 'left';
                    ctx.font = '600 26px "Inter"';
                    ctx.fillText(data.category.toUpperCase(), 80, canvas.height * 0.52 + 150);

                    ctx.fillStyle = textColor;
                    ctx.font = 'italic 700 95px "Playfair Display"';
                    ctx.fillText(data.title, 80, canvas.height * 0.52 + 250);

                    ctx.fillStyle = subTextColor;
                    ctx.font = '300 36px "Inter"';
                    this.wrapText(ctx, data.body, 80, canvas.height * 0.52 + 330, canvas.width - 160, 52);
                }
                else if (data.type === 'wireframe') {
                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'left';
                    ctx.font = '700 80px "Playfair Display"';
                    ctx.fillText(data.title, 100, 200);

                    ctx.fillStyle = subTextColor;
                    ctx.font = '600 24px "Inter"';
                    ctx.fillText(data.subtitle, 100, 260);
                    
                    ctx.font = '300 38px "Inter"';
                    this.wrapText(ctx, data.body, 100, 340, canvas.width - 200, 55);

                    if (data.shape === 'grid') {
                        this.drawGridShape(ctx, 100, 600, canvas.width - 200);
                    } else if (data.shape === 'sphere') {
                        this.drawWireframeSphere(ctx, canvas.width/2, 900, 300);
                    }
                }
                else if (data.type === 'chart') {
                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'left';
                    ctx.font = '700 80px "Playfair Display"';
                    ctx.fillText(data.title, 100, 200);

                    ctx.fillStyle = subTextColor;
                    ctx.font = '600 24px "Inter"';
                    ctx.fillText(data.category.toUpperCase(), 100, 260);
                    
                    ctx.font = '300 38px "Inter"';
                    this.wrapText(ctx, data.body, 100, 340, canvas.width - 200, 55);

                    this.drawChart(ctx, data.chartData, 100, 650, canvas.width - 200, 500);
                }

                // Add Page Number to non-covers
                if (data.type !== 'cover' && data.type !== 'back_cover') {
                    ctx.fillStyle = '#666';
                    ctx.font = '400 24px "Inter"';
                    ctx.textAlign = 'right';
                    const pageNum = index.toString().padStart(2, '0');
                    ctx.fillText(`PG . ${pageNum}`, canvas.width - 100, canvas.height - 80);
                    
                    // Add subtle crosshairs in corners for tech-editorial look
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth = 1;
                    const cSize = 20;
                    [[80, 80], [canvas.width-80, 80], [80, canvas.height-80], [canvas.width-80, canvas.height-80]].forEach(([px, py]) => {
                        ctx.beginPath();
                        ctx.moveTo(px - cSize, py); ctx.lineTo(px + cSize, py);
                        ctx.moveTo(px, py - cSize); ctx.lineTo(px, py + cSize);
                        ctx.stroke();
                    });
                }

                // Update SEO Fallback DOM
                const seoLayer = document.getElementById('seo-layer');
                const p = document.createElement('p');
                p.textContent = `${data.title} - ${data.subtitle || data.category || ''}: ${data.body || ''}`;
                seoLayer.appendChild(p);

                const texture = new THREE.CanvasTexture(canvas);
                texture.colorSpace = THREE.SRGBColorSpace;
                texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // Max clarity
                texture.minFilter = THREE.LinearMipmapLinearFilter;
                return texture;
            }
        }

        /* ---------------------------------------------------------------------
           WEBGL SYSTEM ARCHITECTURE
           --------------------------------------------------------------------- */
        const container = document.getElementById('webgl-container');
        
        // Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.015); // Dynamic void fog

        // Camera Setup
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, CONFIG.cameraZ);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xfffaec, 6); // Warm key light
        spotLight.position.set(15, 20, 15);
        spotLight.angle = Math.PI / 5;
        spotLight.penumbra = 0.8;
        spotLight.castShadow = true;
        spotLight.shadow.bias = -0.0001;
        spotLight.shadow.mapSize.width = isMobile ? 1024 : 2048;
        spotLight.shadow.mapSize.height = isMobile ? 1024 : 2048;
        scene.add(spotLight);

        const fillLight = new THREE.DirectionalLight(0xbbeeff, 1.2); // Cool fill
        fillLight.position.set(-15, -10, 10);
        scene.add(fillLight);

        /* ---------------------------------------------------------------------
           POST-PROCESSING PIPELINE
           --------------------------------------------------------------------- */
        const composer = new EffectComposer(renderer);
        const renderScene = new RenderPass(scene, camera);
        composer.addPass(renderScene);

        // Only add heavy effects on desktop to save mobile battery and ensure 60fps
        if (CONFIG.enablePostProcessing) {
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.25, 0.1, 0.85);
            bloomPass.threshold = 0.3;
            bloomPass.strength = 0.5; // Premium gold glow
            bloomPass.radius = 0.6;
            composer.addPass(bloomPass);

            // Gamma correction needed when using composer
            const gammaPass = new ShaderPass(GammaCorrectionShader);
            composer.addPass(gammaPass);
        }

        /* ---------------------------------------------------------------------
           CUSTOM GLSL PARTICLE BACKGROUND (THE VOID)
           --------------------------------------------------------------------- */
        function createParticleBackground() {
            const particleCount = isMobile ? 800 : 2500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for(let i=0; i<particleCount; i++) {
                // Spread particles in a massive volume
                positions[i*3] = (Math.random() - 0.5) * 100;
                positions[i*3+1] = (Math.random() - 0.5) * 100;
                positions[i*3+2] = (Math.random() - 0.5) * 50 - 20; // Pushed back
                sizes[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

            // Custom Shader Material for glowing, pulsating dust
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0xd4af37) }
                },
                vertexShader: `
                    uniform float uTime;
                    attribute float aSize;
                    varying float vAlpha;
                    void main() {
                        vec4 modelPosition = modelMatrix * vec4(position, 1.0);
                        // Add subtle wave motion based on time
                        modelPosition.y += sin(uTime * 0.5 + modelPosition.x) * 1.0;
                        modelPosition.x += cos(uTime * 0.3 + modelPosition.z) * 1.0;
                        vec4 viewPosition = viewMatrix * modelPosition;
                        gl_Position = projectionMatrix * viewPosition;
                        
                        // Size
                        gl_PointSize = (aSize * 4.0) * (20.0 / -viewPosition.z);
                        // Alpha pulse
                        vAlpha = 0.3 + 0.7 * sin(uTime + aSize * 10.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vAlpha;
                    void main() {
                        float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                        float strength = 0.05 / distanceToCenter - 0.1;
                        gl_FragColor = vec4(uColor, strength * vAlpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            return material; // Return material to update uTime in render loop
        }

        const particleMaterial = createParticleBackground();

        /* ---------------------------------------------------------------------
           MESH GENERATION (THE BOOK & FLEXIBLE PAGES)
           --------------------------------------------------------------------- */
        const bookGroup = new THREE.Group();
        scene.add(bookGroup);
        const pageGroups = [];
        const canvasRenderer = new CanvasRenderer(CONFIG.textureWidth, CONFIG.textureHeight);
        
        // Geometries
        const pageGeometry = new THREE.PlaneGeometry(CONFIG.pageWidth, CONFIG.pageHeight, CONFIG.pageSegments, CONFIG.pageSegments);
        const coverGeometry = new THREE.BoxGeometry(CONFIG.pageWidth, CONFIG.pageHeight, 0.08, CONFIG.pageSegments, CONFIG.pageSegments, 1);

        // We need a custom vertex shader for the pages to allow them to "bend" like real paper
        // We will use a standard material for lighting, but inject GLSL to bend vertices
        function createBendableMaterial(texture, isCover=false) {
            const material = new THREE.MeshStandardMaterial({ 
                map: texture, 
                side: isCover ? THREE.FrontSide : THREE.DoubleSide,
                roughness: isCover ? 0.3 : 0.9,
                metalness: isCover ? 0.2 : 0.0
            });

            // Add custom uniform for bending controlled by GSAP
            material.userData = { bendProgress: { value: 0.0 } };
            
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uBendProgress = material.userData.bendProgress;
                shader.vertexShader = `
                    uniform float uBendProgress;
                ` + shader.vertexShader;
                
                // Inject bend logic before standard position calculation
                shader.vertexShader = shader.vertexShader.replace(
                    '#include <begin_vertex>',
                    `
                    vec3 transformed = vec3(position);
                    // Subtle bend based on X position and progress
                    float bendIntensity = uBendProgress * 0.6;
                    transformed.z += sin(transformed.x * 0.5) * bendIntensity;
                    transformed.y += cos(transformed.x * 0.2) * (bendIntensity * 0.2);
                    `
                );
            };
            return material;
        }

        async function buildBook() {
            for (let i = 0; i < CONFIG.pages; i++) {
                const pivot = new THREE.Group();
                const isCover = (i === 0 || i === CONFIG.pages - 1);
                
                // Base mesh before texture load
                const geometry = isCover ? coverGeometry : pageGeometry;
                const tempMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const mesh = new THREE.Mesh(geometry, tempMat);
                
                // Shift mesh so pivot is at the left edge (acting as a spine)
                mesh.position.set(CONFIG.pageWidth / 2, 0, 0);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Z offset to prevent clipping when book is completely closed
                const zOffset = (i - CONFIG.pages / 2) * -0.015;
                pivot.position.set(-CONFIG.pageWidth / 2, 0, zOffset);
                pivot.add(mesh);
                bookGroup.add(pivot);
                pageGroups.push(pivot);

                // Load Texture Asynchronously
                canvasRenderer.generatePage(PAGE_DATA[i], i).then(texture => {
                    if (isCover) {
                        const materials = [
                            tempMat, tempMat, tempMat, tempMat,
                            createBendableMaterial(texture, true), // Front face
                            tempMat // Back face
                        ];
                        mesh.material = materials;
                    } else {
                        mesh.material = createBendableMaterial(texture, false);
                    }
                    updateProgress(i + 1, CONFIG.pages);
                });
            }
            
            // Initial Presentation Angle
            bookGroup.rotation.y = -Math.PI / 6;
            bookGroup.rotation.x = Math.PI / 16;
            bookGroup.position.z = -2;
        }

        /* ---------------------------------------------------------------------
           LOADING MANAGER
           --------------------------------------------------------------------- */
        const progressBar = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const loaderDetail = document.getElementById('loader-detail');
        const enterBtn = document.getElementById('enter-btn');
        const loaderUI = document.getElementById('loader');

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            progressBar.style.width = percent + '%';
            progressText.innerText = percent + '%';
            
            if (percent < 30) loaderDetail.innerText = "Compiling Shaders...";
            else if (percent < 70) loaderDetail.innerText = "Generating Procedural Textures...";
            else if (percent < 100) loaderDetail.innerText = "Building 3D Meshes...";
            else loaderDetail.innerText = "Experience Ready";
            
            if (current === total) {
                setTimeout(() => {
                    enterBtn.classList.add('visible');
                }, 500);
            }
        }

        enterBtn.addEventListener('click', () => {
            loaderUI.style.opacity = '0';
            // Start audio if user permitted via click event
            audio.init();
            
            setTimeout(() => {
                loaderUI.style.display = 'none';
                initAnimations(); // Initialize ScrollTrigger
                STATE.loaded = true;
                
                // Cinematic Intro Animation
                gsap.fromTo(bookGroup.position, 
                    { z: -10, y: -5 }, 
                    { z: 0, y: 0, duration: 2.5, ease: "expo.out" }
                );
            }, 1000);
        });

        /* ---------------------------------------------------------------------
           MASTER GSAP TIMELINE (THE SHATTER & SEQUENTIAL FOCUS)
           --------------------------------------------------------------------- */
        function initAnimations() {
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-proxy",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5, // Smooth scrubbing
                    onUpdate: (self) => {
                        STATE.scrollProgress = self.progress;
                        checkActivePage(self.progress);
                    }
                }
            });

            // PHASE 1: 0% - 15% -> Book Opening / Fan Out
            tl.to(bookGroup.rotation, { y: 0, x: 0, duration: 2, ease: "power2.inOut" }, 0);
            tl.to(bookGroup.position, { z: 2, duration: 2, ease: "power2.inOut" }, 0);

            pageGroups.forEach((page, i) => {
                if(i !== 0 && i !== CONFIG.pages - 1) {
                    tl.to(page.rotation, {
                        y: -Math.PI / (10 + i * 1.5),
                        duration: 2, ease: "power2.inOut"
                    }, 0);
                }
            });

            // PHASE 2: 15% - 30% -> THE EXPLOSIVE SHATTER
            const shatterStartTime = 2;
            const shatterDuration = 3;

            // Fog darkens the void dynamically
            tl.to(scene.fog, { density: 0.04, duration: shatterDuration, ease: "power2.inOut" }, shatterStartTime);
            
            // Random scatter calculation
            pageGroups.forEach((page, i) => {
                const rx = (Math.random() - 0.5) * 25;
                const ry = (Math.random() - 0.5) * 25;
                const rz = -15 - Math.random() * 20;
                const rotX = Math.random() * Math.PI * 2;
                const rotY = Math.random() * Math.PI * 2;
                const rotZ = Math.random() * Math.PI * 2;

                // Explode Groups
                tl.to(page.position, { x: rx, y: ry, z: rz, duration: shatterDuration, ease: "expo.out" }, shatterStartTime);
                tl.to(page.rotation, { x: rotX, y: rotY, z: rotZ, duration: shatterDuration, ease: "expo.out" }, shatterStartTime);
                
                // Detach spine by resetting the internal mesh offset to zero
                const mesh = page.children[0];
                tl.to(mesh.position, { x: 0, y: 0, z: 0, duration: shatterDuration, ease: "expo.out" }, shatterStartTime);
                
                // Trigger GLSL paper bend
                if(mesh.material && mesh.material.userData) {
                    tl.to(mesh.material.userData.bendProgress, { value: 1.0, duration: shatterDuration, ease: "power1.inOut" }, shatterStartTime);
                }
            });

            // PHASE 3: 30% - 100% -> SEQUENTIAL READING
            const sequenceStartTime = shatterStartTime + shatterDuration;
            const stepDuration = 2.5; // Time spent moving
            const readDuration = 2;   // Time held static in center
            
            pageGroups.forEach((page, i) => {
                const stepStart = sequenceStartTime + (i * (stepDuration + readDuration));
                const mesh = page.children[0];

                // Fly IN perfectly to center camera
                tl.to(page.position, { x: 0, y: 0, z: CONFIG.readZ, duration: stepDuration, ease: "power3.inOut" }, stepStart);
                tl.to(page.rotation, { x: 0, y: 0, z: 0, duration: stepDuration, ease: "power3.inOut" }, stepStart);
                
                // Straighten paper perfectly flat for reading
                if(mesh.material && mesh.material.userData) {
                    tl.to(mesh.material.userData.bendProgress, { value: 0.0, duration: stepDuration, ease: "power2.out" }, stepStart);
                }

                // Fly OUT (Dismiss page)
                const stepOut = stepStart + stepDuration + readDuration;
                if (i < CONFIG.pages - 1) {
                    tl.to(page.position, {
                        x: (Math.random() - 0.5) * 10,
                        y: 15, // Fly upwards out of frame
                        z: -10,
                        duration: stepDuration,
                        ease: "power4.in"
                    }, stepOut);
                    tl.to(page.rotation, {
                        x: (Math.PI / 2) * (Math.random() > 0.5 ? 1 : -1),
                        y: Math.random(),
                        z: Math.random(),
                        duration: stepDuration,
                        ease: "power4.in"
                    }, stepOut);
                    
                    // Re-apply bend as it flies away
                    if(mesh.material && mesh.material.userData) {
                        tl.to(mesh.material.userData.bendProgress, { value: 1.0, duration: stepDuration, ease: "power2.in" }, stepOut);
                    }
                }
            });
        }

        // Trigger Audio Synthesis based on active scroll section
        function checkActivePage(progress) {
            if (!STATE.loaded) return;
            const shatterEndProgress = 0.3; // 30% mark in timeline
            
            if (progress < shatterEndProgress) {
                STATE.activePage = -1;
                return;
            }
            
            const remainingProgress = progress - shatterEndProgress;
            const pageFraction = remainingProgress / (1 - shatterEndProgress);
            const calcPage = Math.floor(pageFraction * CONFIG.pages);
            
            if (calcPage !== STATE.activePage && calcPage >= 0 && calcPage < CONFIG.pages) {
                STATE.activePage = calcPage;
                // Play whoosh, pitch gets slightly higher as user gets deeper into portfolio
                audio.playWhoosh(1.0 + (calcPage * 0.1)); 
            }
        }

        /* ---------------------------------------------------------------------
           INPUT (MOUSE / TOUCH / GYROSCOPE) & RESPONSIVE HANDLING
           --------------------------------------------------------------------- */
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        const coordText = document.getElementById('coordinates');

        // Mouse Parallax & Custom Cursor (Desktop Only)
        if (!isMobile) {
            window.addEventListener('mousemove', (e) => {
                // Normalized Device Coordinates for Parallax
                STATE.targetPointer.x = (e.clientX / window.innerWidth) * 2 - 1;
                STATE.targetPointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                // Cursor DOM update
                cursorDot.style.left = `${e.clientX}px`;
                cursorDot.style.top = `${e.clientY}px`;
                cursorOutline.animate({
                    left: `${e.clientX}px`, top: `${e.clientY}px`
                }, { duration: 400, fill: "forwards", easing: "ease-out" });

                coordText.innerText = `X: ${STATE.targetPointer.x.toFixed(3)} | Y: ${STATE.targetPointer.y.toFixed(3)}`;
            });

            // Hover interactions
            document.querySelectorAll('button, a').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorOutline.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursorOutline.style.backgroundColor = 'rgba(255,255,255,0.1)';
                    audio.playClick();
                });
                el.addEventListener('mouseleave', () => {
                    cursorOutline.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursorOutline.style.backgroundColor = 'transparent';
                });
            });
        }

        // Device Orientation for Mobile Parallax
        if (CONFIG.useGyroscope && window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.gamma === null || e.beta === null) return;
                let gamma = e.gamma; // L/R tilt [-90, 90]
                let beta = e.beta;   // F/B tilt [-180, 180]
                
                // Constrain values to prevent extreme flipping
                gamma = Math.max(-45, Math.min(45, gamma));
                beta = Math.max(0, Math.min(90, beta)) - 45; 

                STATE.targetGyro.x = gamma / 45;
                STATE.targetGyro.y = -(beta / 45);
            });
        }

        // Responsive Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if(CONFIG.enablePostProcessing) {
                composer.setSize(window.innerWidth, window.innerHeight);
            }
            ScrollTrigger.refresh();
        });

        /* ---------------------------------------------------------------------
           RENDER LOOP
           --------------------------------------------------------------------- */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update Particle GLSL Shader Time
            if (particleMaterial) {
                particleMaterial.uniforms.uTime.value = time;
            }

            // Camera Parallax Interpolation (Lerp)
            if (STATE.loaded) {
                if (isMobile && CONFIG.useGyroscope) {
                    STATE.gyro.x += (STATE.targetGyro.x - STATE.gyro.x) * 0.05;
                    STATE.gyro.y += (STATE.targetGyro.y - STATE.gyro.y) * 0.05;
                    camera.position.x = STATE.gyro.x * 1.5;
                    camera.position.y = STATE.gyro.y * 1.5;
                } else {
                    STATE.pointer.x += (STATE.targetPointer.x - STATE.pointer.x) * 0.05;
                    STATE.pointer.y += (STATE.targetPointer.y - STATE.pointer.y) * 0.05;
                    camera.position.x = STATE.pointer.x * 1.0;
                    camera.position.y = STATE.pointer.y * 1.0;
                }
                camera.lookAt(0, 0, 0);
            }

            // Render Pipeline Switch
            if (CONFIG.enablePostProcessing) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        // Kickoff Application
        buildBook();
        animate();

    </script>
</body>
</html>
